<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Pokemon Y1 Word Quest - 7月 2nd & 3rd Week</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap");

    :root {
      --kid-letter-font: "Comic Neue", "Comic Sans MS", "Chalkboard SE", "Marker Felt";
      --ink: #172033;
      --muted: #576173;
      --line: #202838;
      --paper: #fffdf3;
      --cream: #fff4c7;
      --sky: #78d8ff;
      --grass: #58c45b;
      --grass-dark: #249346;
      --water: #3fa8ff;
      --yellow: #ffd84a;
      --yellow-dark: #d69c00;
      --red: #e63a2e;
      --blue: #2a76d2;
      --green: #28a85b;
      --orange: #f1892f;
      --shadow: 0 8px 0 rgba(22, 30, 44, 0.18);
      --panel-shadow: 0 16px 34px rgba(20, 36, 64, 0.2);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body,
    button,
    input,
    .answer-display,
    .letter-tile,
    .choice-button {
      font-family: var(--kid-letter-font), "Noto Sans SC", system-ui, sans-serif;
    }

    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 12%, rgba(255,255,255,0.86) 0 30px, transparent 31px),
        radial-gradient(circle at 18% 11%, rgba(255,255,255,0.86) 0 22px, transparent 23px),
        radial-gradient(circle at 82% 14%, rgba(255,255,255,0.78) 0 38px, transparent 39px),
        linear-gradient(180deg, #72d9ff 0%, #9ae8ff 54%, #77d167 54%, #4fbf58 100%);
      letter-spacing: 0;
      overflow-x: hidden;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.58;
    }

    .app {
      width: min(1180px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: max(14px, env(safe-area-inset-top)) clamp(10px, 2.5vw, 24px) max(18px, env(safe-area-inset-bottom));
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .ball-badge {
      position: relative;
      width: 48px;
      height: 48px;
      flex: 0 0 auto;
      border: 4px solid var(--line);
      border-radius: 50%;
      background: linear-gradient(180deg, var(--red) 0 47%, var(--line) 47% 55%, white 55%);
      box-shadow: 0 5px 0 rgba(0,0,0,0.18);
    }

    .ball-badge::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 17px;
      height: 17px;
      border: 4px solid var(--line);
      border-radius: 50%;
      background: white;
      transform: translate(-50%, -50%);
    }

    h1 {
      margin: 0;
      color: #fffdf2;
      font-size: clamp(1.65rem, 4.4vw, 3.1rem);
      line-height: 0.96;
      text-shadow: 0 3px 0 #12345d, 2px 5px 0 rgba(0,0,0,0.18);
      overflow-wrap: anywhere;
    }

    .mini-status {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 6px 10px;
      border: 3px solid var(--line);
      border-radius: 999px;
      background: var(--paper);
      box-shadow: 0 4px 0 rgba(0,0,0,0.14);
      color: #132540;
      font-size: clamp(0.95rem, 2.8vw, 1.13rem);
      white-space: nowrap;
    }

    .music-toggle {
      width: 42px;
      min-width: 42px;
      padding: 0;
      background: linear-gradient(180deg, #ffe66b, var(--yellow));
      color: #513100;
    }

    .music-toggle.is-off {
      background: rgba(255,255,255,0.76);
      color: var(--muted);
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    .panel {
      position: relative;
      border: 4px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
      box-shadow: var(--shadow), var(--panel-shadow);
      overflow: hidden;
    }

    .panel::before {
      content: "";
      display: block;
      height: 22px;
      background:
        linear-gradient(90deg, transparent 0 18px, rgba(0,0,0,0.18) 18px 22px, transparent 22px 40px),
        linear-gradient(180deg, #ffdf56, #ffc02c);
      border-bottom: 4px solid var(--line);
    }

    .panel-body {
      padding: clamp(16px, 3.4vw, 28px);
    }

    .start-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(280px, 0.95fr);
      gap: clamp(16px, 3vw, 28px);
      align-items: stretch;
    }

    .arena {
      position: relative;
      min-height: 370px;
      border: 4px solid var(--line);
      border-radius: var(--radius);
      background:
        radial-gradient(circle at 18% 18%, #fff 0 28px, transparent 29px),
        radial-gradient(circle at 25% 17%, #fff 0 36px, transparent 37px),
        radial-gradient(circle at 76% 21%, #fff 0 24px, transparent 25px),
        radial-gradient(circle at 83% 20%, #fff 0 40px, transparent 41px),
        linear-gradient(180deg, #8feaff 0 62%, #79d867 62% 100%);
      overflow: hidden;
      box-shadow: inset 0 -14px 0 rgba(0,0,0,0.08);
    }

    .arena::before {
      content: "";
      position: absolute;
      left: -8%;
      right: -8%;
      bottom: 44px;
      height: 110px;
      background:
        radial-gradient(ellipse at 17% 100%, #36b95a 0 76px, transparent 77px),
        radial-gradient(ellipse at 46% 100%, #93de6c 0 96px, transparent 97px),
        radial-gradient(ellipse at 76% 100%, #29a94b 0 82px, transparent 83px);
      z-index: 1;
    }

    .arena::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 58px;
      border-top: 4px solid var(--line);
      background:
        linear-gradient(90deg, rgba(0,0,0,0.12) 0 3px, transparent 3px 44px) 0 0 / 44px 100%,
        linear-gradient(180deg, #b9783a, #895127);
      z-index: 2;
    }

    .energy-orbit {
      position: absolute;
      inset: 10% 8% auto auto;
      display: flex;
      gap: 10px;
      z-index: 3;
    }

    .energy {
      width: 38px;
      height: 38px;
      border: 4px solid var(--line);
      border-radius: 50%;
      background: linear-gradient(180deg, var(--red) 0 46%, var(--line) 46% 55%, white 55%);
      box-shadow: 0 6px 0 rgba(0,0,0,0.16);
      animation: floatBall 1.8s ease-in-out infinite;
    }

    .energy:nth-child(2) {
      animation-delay: 0.24s;
    }

    .energy:nth-child(3) {
      animation-delay: 0.48s;
    }

    @keyframes floatBall {
      0%, 100% { transform: translateY(0) rotate(-8deg); }
      50% { transform: translateY(-9px) rotate(8deg); }
    }

    .hero-stage {
      position: absolute;
      left: 8%;
      right: 8%;
      bottom: 46px;
      z-index: 4;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
    }

    .pokemon-img {
      display: block;
      flex: 0 0 auto;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      object-position: center bottom;
      filter: drop-shadow(0 12px 0 rgba(0,0,0,0.18));
      transform-origin: 50% 92%;
      user-select: none;
      -webkit-user-drag: none;
    }

    .pokemon-buddy {
      --body: #ffd84f;
      --body-dark: #f4b53a;
      --belly: #fff1aa;
      --accent: #ff5148;
      --ear: #ffd84f;
      --ear-tip: #202736;
      --tail: #ffd84f;
      position: relative;
      display: block;
      flex: 0 0 auto;
      aspect-ratio: 1;
      max-width: 100%;
      max-height: 100%;
      filter: drop-shadow(0 12px 0 rgba(0,0,0,0.18));
      transform-origin: 50% 92%;
    }

    .pokemon-buddy::before {
      content: "";
      position: absolute;
      z-index: 3;
      inset: 22% 12% 8%;
      border: 4px solid var(--line);
      border-radius: 50% 50% 43% 43% / 48% 48% 52% 52%;
      background:
        radial-gradient(circle at 36% 34%, white 0 3%, transparent 3.4%),
        radial-gradient(circle at 64% 34%, white 0 3%, transparent 3.4%),
        radial-gradient(circle at 35% 36%, var(--line) 0 8%, transparent 8.7%),
        radial-gradient(circle at 65% 36%, var(--line) 0 8%, transparent 8.7%),
        radial-gradient(ellipse at 50% 78%, var(--belly) 0 30%, transparent 31%),
        linear-gradient(180deg, var(--body), var(--body-dark));
      box-shadow: inset 0 -12px 0 rgba(0,0,0,0.08);
    }

    .pokemon-buddy::after {
      content: "";
      position: absolute;
      z-index: 4;
      inset: 42% 24% 24%;
      background:
        radial-gradient(circle at 16% 22%, var(--accent) 0 13%, transparent 14%),
        radial-gradient(circle at 84% 22%, var(--accent) 0 13%, transparent 14%),
        radial-gradient(ellipse at 50% 60%, #5f1c2e 0 11%, transparent 12%);
      pointer-events: none;
    }

    .buddy-ear,
    .buddy-tail,
    .buddy-foot,
    .buddy-mark {
      position: absolute;
      display: block;
      pointer-events: none;
    }

    .buddy-ear {
      z-index: 2;
      top: 4%;
      width: 24%;
      height: 42%;
      border: 4px solid var(--line);
      border-radius: 70% 70% 18% 18%;
      background: linear-gradient(180deg, var(--ear-tip) 0 22%, var(--ear) 23% 100%);
      transform-origin: 50% 100%;
    }

    .buddy-ear.left {
      left: 25%;
      transform: rotate(-26deg);
    }

    .buddy-ear.right {
      right: 22%;
      transform: rotate(30deg);
    }

    .buddy-tail {
      z-index: 1;
      right: 3%;
      bottom: 24%;
      width: 32%;
      height: 30%;
      border: 4px solid var(--line);
      border-radius: 28% 70% 24% 66%;
      background: linear-gradient(135deg, var(--tail), var(--body-dark));
      transform: rotate(21deg);
    }

    .buddy-foot {
      z-index: 2;
      bottom: 5%;
      width: 26%;
      height: 16%;
      border: 4px solid var(--line);
      border-radius: 50%;
      background: var(--body-dark);
    }

    .buddy-foot.left {
      left: 22%;
      transform: rotate(-10deg);
    }

    .buddy-foot.right {
      right: 22%;
      transform: rotate(10deg);
    }

    .buddy-mark {
      z-index: 5;
      left: 38%;
      top: 58%;
      width: 24%;
      height: 10%;
      border-radius: 0 0 999px 999px;
      background: #fff7f0;
      opacity: 0.78;
    }

    .pokemon-buddy[data-creature="eevee"] {
      --body: #c88951;
      --body-dark: #8f5b36;
      --belly: #fff0c9;
      --accent: #ffe2aa;
      --ear: #b97942;
      --ear-tip: #5c3b2a;
      --tail: #fff0c9;
    }

    .pokemon-buddy[data-creature="eevee"] .buddy-ear {
      width: 28%;
      height: 39%;
      top: 8%;
      border-radius: 75% 75% 16% 16%;
    }

    .pokemon-buddy[data-creature="eevee"] .buddy-tail {
      width: 38%;
      height: 34%;
      right: -3%;
      bottom: 25%;
      border-radius: 74% 48% 74% 46%;
      background: radial-gradient(circle at 60% 35%, #fff0c9 0 42%, #b97942 43%);
    }

    .pokemon-buddy[data-creature="squirtle"] {
      --body: #77d7e8;
      --body-dark: #46a7c0;
      --belly: #ffecc7;
      --accent: #ff9fb5;
      --ear: #77d7e8;
      --ear-tip: #46a7c0;
      --tail: #73c4d8;
    }

    .pokemon-buddy[data-creature="squirtle"] .buddy-ear {
      top: 28%;
      width: 19%;
      height: 18%;
      border-radius: 50%;
      background: var(--body);
    }

    .pokemon-buddy[data-creature="squirtle"] .buddy-tail {
      width: 28%;
      height: 28%;
      right: 0;
      bottom: 24%;
      border-radius: 50%;
      background:
        radial-gradient(circle at 42% 48%, #ffecc7 0 44%, transparent 45%),
        linear-gradient(135deg, #9a7054, #6b4936);
    }

    .pokemon-buddy[data-creature="charmander"] {
      --body: #ff9a3f;
      --body-dark: #e7652e;
      --belly: #ffe5b8;
      --accent: #ffcf73;
      --ear: #ff9a3f;
      --ear-tip: #e7652e;
      --tail: #ff9a3f;
    }

    .pokemon-buddy[data-creature="charmander"] .buddy-ear {
      top: 13%;
      width: 19%;
      height: 26%;
      border-radius: 60% 60% 20% 20%;
      background: var(--body);
    }

    .pokemon-buddy[data-creature="charmander"] .buddy-tail::after {
      content: "";
      position: absolute;
      right: -22%;
      top: -24%;
      width: 52%;
      height: 60%;
      border: 3px solid var(--line);
      border-radius: 50% 50% 50% 12%;
      background: radial-gradient(circle at 44% 58%, #fff36c 0 28%, transparent 29%), #ff5b37;
      transform: rotate(22deg);
    }

    .pokemon-buddy[data-creature="psyduck"] {
      --body: #ffe074;
      --body-dark: #f2b84b;
      --belly: #fff4c6;
      --accent: #ffb84d;
      --ear: #ffe074;
      --ear-tip: #f2b84b;
      --tail: #ffe074;
    }

    .pokemon-buddy[data-creature="psyduck"] .buddy-ear {
      top: 14%;
      width: 16%;
      height: 27%;
      border-radius: 52%;
      background: var(--body);
    }

    .pokemon-buddy[data-creature="psyduck"] .buddy-mark {
      left: 32%;
      top: 48%;
      width: 36%;
      height: 20%;
      border: 4px solid var(--line);
      border-radius: 55% 55% 48% 48%;
      background: #f5a14c;
      opacity: 1;
    }

    .hero-pokemon {
      width: min(42vw, 210px);
      height: min(44vw, 230px);
      animation: buddyBounce 1.9s ease-in-out infinite;
    }

    .rival-pokemon {
      width: min(30vw, 160px);
      height: min(32vw, 170px);
      opacity: 0.92;
      transform: scaleX(-1);
      animation: rivalBounce 2.2s ease-in-out infinite 0.25s;
    }

    @keyframes buddyBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-7px); }
    }

    @keyframes rivalBounce {
      0%, 100% { transform: scaleX(-1) translateY(0); }
      50% { transform: scaleX(-1) translateY(-7px); }
    }

    .spark-line {
      position: absolute;
      left: 14%;
      right: 15%;
      top: 32%;
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(255,216,74,0.95), transparent);
      box-shadow: 0 0 22px rgba(255,216,74,0.72);
      transform: rotate(-5deg);
      z-index: 3;
      animation: sparkPulse 1.4s ease-in-out infinite;
    }

    @keyframes sparkPulse {
      0%, 100% { opacity: 0.26; }
      50% { opacity: 0.92; }
    }

    .start-copy h2,
    .section-title {
      margin: 0 0 12px;
      font-size: clamp(1.55rem, 4.7vw, 2.45rem);
      line-height: 1.05;
      color: #15243a;
    }

    .start-copy p {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: clamp(1.08rem, 3.2vw, 1.35rem);
      line-height: 1.34;
    }

    .form-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: stretch;
    }

    .name-input {
      width: 100%;
      min-height: 56px;
      padding: 8px 12px;
      border: 3px solid var(--line);
      border-radius: var(--radius);
      background: white;
      color: var(--ink);
      font-size: clamp(1.28rem, 4.6vw, 1.72rem);
      outline: none;
      box-shadow: inset 0 3px 0 rgba(0,0,0,0.08);
    }

    .name-input:focus {
      border-color: var(--blue);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 52px;
      padding: 10px 16px;
      border: 3px solid var(--line);
      border-radius: var(--radius);
      background: white;
      color: var(--ink);
      box-shadow: 0 5px 0 rgba(0,0,0,0.18);
      font-size: clamp(1rem, 3.1vw, 1.22rem);
      text-align: center;
      transition: transform 140ms ease, box-shadow 140ms ease, filter 140ms ease;
    }

    .btn:hover {
      filter: brightness(1.03);
    }

    .btn:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 rgba(0,0,0,0.2);
    }

    .btn.primary {
      background: linear-gradient(180deg, #ff6d5c, var(--red));
      color: white;
      text-shadow: 0 2px 0 rgba(0,0,0,0.2);
    }

    .btn.green {
      background: linear-gradient(180deg, #72e889, var(--green));
      color: white;
      text-shadow: 0 2px 0 rgba(0,0,0,0.2);
    }

    .btn.blue {
      background: linear-gradient(180deg, #63bdff, var(--blue));
      color: white;
      text-shadow: 0 2px 0 rgba(0,0,0,0.2);
    }

    .btn.gold {
      background: linear-gradient(180deg, #ffe66b, var(--yellow));
      color: #513100;
    }

    .btn.ghost {
      background: rgba(255,255,255,0.78);
    }

    .choice-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
    }

    .choice-card {
      display: grid;
      justify-items: center;
      align-content: center;
      gap: 8px;
      min-height: 176px;
      padding: 10px;
      border: 3px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, #ffffff, #fff1c2);
      box-shadow: 0 6px 0 rgba(0,0,0,0.16);
      color: var(--ink);
      text-align: center;
      transition: transform 150ms ease, box-shadow 150ms ease;
    }

    .choice-card:hover,
    .choice-card.selected {
      transform: translateY(-4px);
      box-shadow: 0 10px 0 rgba(0,0,0,0.16);
    }

    .choice-card .avatar-shell {
      display: grid;
      place-items: center;
      width: 92px;
      height: 92px;
      border: 3px solid var(--line);
      border-radius: 50%;
      background: white;
      overflow: hidden;
    }

    .choice-card .avatar-shell .pokemon-img {
      width: 94%;
      height: 94%;
      filter: none;
      object-fit: contain;
      object-position: center bottom;
    }

    .choice-card strong {
      display: block;
      font-size: clamp(1.06rem, 3vw, 1.34rem);
      line-height: 1;
    }

    .choice-card span {
      color: var(--muted);
      font-size: clamp(0.88rem, 2.5vw, 1.02rem);
    }

    .option-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 16px;
    }

    .option-button {
      min-height: 132px;
      padding: 16px;
      border: 3px solid var(--line);
      border-radius: var(--radius);
      background: white;
      box-shadow: 0 6px 0 rgba(0,0,0,0.16);
      color: var(--ink);
      text-align: left;
    }

    .option-button strong {
      display: block;
      font-size: clamp(1.36rem, 4vw, 2rem);
      line-height: 1.08;
      overflow-wrap: anywhere;
    }

    .option-button span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: clamp(0.98rem, 2.8vw, 1.14rem);
      line-height: 1.24;
    }

    .option-button.week-july {
      background: linear-gradient(180deg, #fff, #fff1be);
    }

    .option-button.week-august {
      background: linear-gradient(180deg, #fff, #dff8ff);
    }

    .screen-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .game-shell {
      display: grid;
      grid-template-columns: minmax(280px, 0.86fr) minmax(0, 1.14fr);
      gap: clamp(12px, 2.4vw, 18px);
      align-items: stretch;
    }

    .play-scene {
      min-height: 520px;
    }

    .play-scene .hero-stage {
      left: 9%;
      right: 9%;
      bottom: 50px;
    }

    .play-scene .hero-pokemon {
      width: min(34vw, 205px);
      height: min(36vw, 225px);
    }

    .play-scene .rival-pokemon {
      width: min(28vw, 160px);
      height: min(30vw, 170px);
    }

    .hud {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }

    .hud .chip {
      min-width: 0;
      justify-content: flex-start;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .hp {
      color: #d82b22;
      text-shadow: 0 2px 0 white;
      white-space: nowrap;
    }

    .question-panel {
      border: 4px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255,253,243,0.96);
      box-shadow: var(--shadow);
      padding: clamp(14px, 3vw, 22px);
    }

    .prompt-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
    }

    .prompt-icon {
      display: grid;
      place-items: center;
      width: clamp(64px, 16vw, 88px);
      height: clamp(64px, 16vw, 88px);
      border: 4px solid var(--line);
      border-radius: 50%;
      background: linear-gradient(180deg, var(--red) 0 47%, var(--line) 47% 55%, white 55%);
      box-shadow: 0 6px 0 rgba(0,0,0,0.16);
      position: relative;
    }

    .prompt-icon::after {
      content: "";
      width: 24px;
      height: 24px;
      border: 4px solid var(--line);
      border-radius: 50%;
      background: white;
    }

    .prompt-title {
      margin: 0;
      font-size: clamp(1.5rem, 4.8vw, 2.35rem);
      line-height: 1.1;
      overflow-wrap: anywhere;
    }

    .prompt-sub {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: clamp(1rem, 3vw, 1.18rem);
      line-height: 1.22;
    }

    .progress-track {
      height: 18px;
      border: 3px solid var(--line);
      border-radius: 999px;
      background: #e8eff8;
      overflow: hidden;
      margin: 0 0 14px;
    }

    .progress-bar {
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, #3cd66c, var(--yellow));
      transition: width 250ms ease;
    }

    .answer-display {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 7px;
      min-height: 78px;
      padding: 12px;
      border: 3px dashed #2f3541;
      border-radius: var(--radius);
      background: white;
      margin: 12px 0;
    }

    .answer-slot {
      display: inline-grid;
      place-items: center;
      min-width: clamp(28px, 7.4vw, 42px);
      height: clamp(38px, 9vw, 50px);
      border-bottom: 4px solid var(--line);
      font-size: clamp(1.25rem, 5vw, 1.8rem);
      color: var(--blue);
      line-height: 1;
    }

    .answer-space {
      min-width: clamp(18px, 5vw, 28px);
      border-bottom: 0;
    }

    .letter-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0;
    }

    .letter-tile,
    .choice-button {
      min-height: 48px;
      border: 3px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, #fff, #ffeaa1);
      box-shadow: 0 4px 0 rgba(0,0,0,0.16);
      color: var(--ink);
      font-size: clamp(1.06rem, 3.6vw, 1.42rem);
    }

    .letter-tile {
      min-width: 48px;
      padding: 6px 12px;
    }

    .letter-tile.used {
      opacity: 0.36;
      transform: translateY(3px);
      box-shadow: none;
    }

    .letter-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .choice-list {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .choice-button {
      width: 100%;
      padding: 12px 14px;
      text-align: left;
      background: linear-gradient(180deg, #fff, #dff4ff);
    }

    .feedback {
      min-height: 34px;
      margin-top: 10px;
      font-size: clamp(1.08rem, 3.4vw, 1.28rem);
      color: var(--muted);
    }

    .feedback.good {
      color: #168242;
    }

    .feedback.bad {
      color: #c32121;
    }

    .teacher-panel {
      display: none;
      margin-top: 16px;
      padding: 12px;
      border: 3px dashed var(--line);
      border-radius: var(--radius);
      background: rgba(255,255,255,0.78);
    }

    .teacher-panel.visible {
      display: block;
    }

    .teacher-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 8px;
    }

    .teacher-grid input {
      min-height: 44px;
      padding: 8px 10px;
      border: 3px solid var(--line);
      border-radius: var(--radius);
      font-size: 1rem;
    }

    .teacher-results {
      width: 100%;
      margin-top: 10px;
      border-collapse: collapse;
      font-size: 0.92rem;
    }

    .teacher-results th,
    .teacher-results td {
      border: 2px solid var(--line);
      padding: 5px;
      background: white;
      text-align: left;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin: 16px 0;
    }

    .result-item {
      min-height: 86px;
      padding: 10px;
      border: 3px solid var(--line);
      border-radius: var(--radius);
      background: white;
      box-shadow: 0 5px 0 rgba(0,0,0,0.14);
      font-size: clamp(0.98rem, 2.7vw, 1.15rem);
    }

    .score-big {
      font-size: clamp(3rem, 14vw, 6rem);
      line-height: 0.95;
      color: var(--red);
      text-shadow: 0 4px 0 #ffd7d1;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 900px) {
      .start-layout,
      .game-shell {
        grid-template-columns: 1fr;
      }

      .choice-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .play-scene {
        min-height: 330px;
      }

      .arena {
        min-height: 320px;
      }
    }

    @media (max-width: 640px) {
      .app {
        padding-inline: 8px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .mini-status {
        justify-content: flex-start;
      }

      .panel-body {
        padding: 14px;
      }

      .form-row,
      .option-grid,
      .teacher-grid,
      .result-grid {
        grid-template-columns: 1fr;
      }

      .choice-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .choice-card {
        min-height: 154px;
        padding: 9px;
      }

      .choice-card .avatar-shell {
        width: 78px;
        height: 78px;
      }

      .hud {
        grid-template-columns: 1fr;
      }

      .prompt-row {
        grid-template-columns: 1fr;
        justify-items: start;
      }

      .arena {
        min-height: 300px;
      }

      .hero-stage {
        left: 5%;
        right: 5%;
      }

      .hero-pokemon {
        width: min(50vw, 168px);
        height: min(52vw, 188px);
      }

      .rival-pokemon {
        width: min(36vw, 118px);
        height: min(38vw, 130px);
      }

      .letter-tile {
        min-width: 44px;
        min-height: 44px;
        padding: 5px 10px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 1ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="ball-badge" aria-hidden="true"></div>
        <h1>Pokemon Y1 Word Quest</h1>
      </div>
      <div class="mini-status">
        <span class="chip" id="studentChip">Trainer: -</span>
        <span class="chip" id="syncChip">Scores ready</span>
        <button class="chip music-toggle is-off" id="musicToggle" type="button" aria-label="Music">♪</button>
      </div>
    </header>

    <main>
      <section class="screen active" id="startScreen">
        <div class="panel">
          <div class="panel-body start-layout">
            <div class="arena" aria-label="Pokemon game arena">
              <div class="energy-orbit" aria-hidden="true">
                <div class="energy"></div>
                <div class="energy"></div>
                <div class="energy"></div>
              </div>
              <div class="spark-line" aria-hidden="true"></div>
              <div class="hero-stage">
                <img class="pokemon-img hero-pokemon" id="startHero" alt="Pikachu">
                <img class="pokemon-img rival-pokemon" id="startRival" alt="Squirtle">
              </div>
            </div>
            <div class="start-copy">
              <h2>Choose your Pokemon and start Y1 training.</h2>
              <p>Practise 7月 2nd & 3rd Week spelling with your Pokemon buddy.</p>
              <form class="form-row" id="nameForm">
                <input class="name-input" id="studentName" name="studentName" autocomplete="name" placeholder="Student name" required>
                <button class="btn primary" type="submit">Start</button>
              </form>
              <div class="teacher-panel" id="teacherPanel">
                <div class="teacher-grid">
                  <input id="scriptUrlInput" placeholder="Apps Script Web App URL">
                  <button class="btn blue" id="saveScriptUrl" type="button">Save</button>
                  <button class="btn ghost" id="syncNow" type="button">Sync</button>
                </div>
                <div class="feedback" id="teacherStatus"></div>
                <table class="teacher-results" aria-label="Local results">
                  <thead>
                    <tr>
                      <th>Name</th>
                      <th>Week</th>
                      <th>Mode</th>
                      <th>Score</th>
                    </tr>
                  </thead>
                  <tbody id="teacherResultsBody"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="screen" id="characterScreen">
        <div class="panel">
          <div class="panel-body">
            <h2 class="section-title">Choose your Pokemon</h2>
            <div class="choice-grid" id="characterGrid"></div>
            <div class="screen-actions">
              <button class="btn ghost" type="button" data-back="startScreen">Back</button>
            </div>
          </div>
        </div>
      </section>

      <section class="screen" id="weekScreen">
        <div class="panel">
          <div class="panel-body">
            <h2 class="section-title">Choose week</h2>
            <div class="option-grid" id="weekGrid"></div>
            <div class="screen-actions">
              <button class="btn ghost" type="button" data-back="characterScreen">Back</button>
            </div>
          </div>
        </div>
      </section>

      <section class="screen" id="modeScreen">
        <div class="panel">
          <div class="panel-body">
            <h2 class="section-title">Choose mode</h2>
            <div class="option-grid">
              <button class="option-button" type="button" data-mode="spelling">
                <strong>Spelling</strong>
                <span>Read Chinese meaning and build the English word.</span>
              </button>
              <button class="option-button" type="button" data-mode="listening">
                <strong>Listening</strong>
                <span>Hear the British English sound and choose the word.</span>
              </button>
            </div>
            <div class="screen-actions">
              <button class="btn ghost" type="button" data-back="weekScreen">Back</button>
            </div>
          </div>
        </div>
      </section>

      <section class="screen" id="gameScreen">
        <div class="game-shell">
          <div class="arena play-scene" aria-label="Pokemon battle scene">
            <div class="energy-orbit" aria-hidden="true">
              <div class="energy"></div>
              <div class="energy"></div>
              <div class="energy"></div>
            </div>
            <div class="spark-line" aria-hidden="true"></div>
            <div class="hero-stage">
              <img class="pokemon-img hero-pokemon" id="battleHero" alt="Pikachu">
              <img class="pokemon-img rival-pokemon" id="battleRival" alt="Squirtle">
            </div>
          </div>

          <div class="question-panel">
            <div class="hud">
              <span class="chip" id="hudName">Trainer</span>
              <span class="chip" id="hudWeek">Week</span>
              <span class="chip hp" id="hudLives">HP</span>
              <span class="chip" id="hudScore">Score 0</span>
            </div>
            <div class="progress-track">
              <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="prompt-row">
              <div class="prompt-icon" aria-hidden="true"></div>
              <div>
                <h2 class="prompt-title" id="promptTitle">Ready?</h2>
                <p class="prompt-sub" id="promptSub">Answer the question.</p>
              </div>
            </div>

            <div id="spellingArea">
              <div class="answer-display" id="answerDisplay" aria-label="Current answer"></div>
              <div class="letter-grid" id="letterGrid"></div>
              <div class="letter-actions">
                <button class="btn ghost" id="backLetter" type="button">Back</button>
                <button class="btn ghost" id="clearLetters" type="button">Clear</button>
                <button class="btn green" id="checkSpelling" type="button">Check</button>
              </div>
            </div>

            <div id="listeningArea" class="hidden">
              <button class="btn gold" id="playAudio" type="button">Play Word</button>
              <div class="choice-list" id="choiceList"></div>
            </div>

            <div class="feedback" id="feedback"></div>
          </div>
        </div>
      </section>

      <section class="screen" id="resultScreen">
        <div class="panel">
          <div class="panel-body">
            <h2 class="section-title">Training complete</h2>
            <div class="score-big" id="scoreBig">0</div>
            <div class="result-grid" id="resultGrid"></div>
            <div class="feedback" id="resultSync"></div>
            <div class="screen-actions">
              <button class="btn primary" id="playAgain" type="button">Play Again</button>
              <button class="btn green" id="newPlayer" type="button">New Player</button>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

    init();

    function init() {
      setPokemonImage(dom.startHero, characters[0]);
      setPokemonImage(dom.startRival, characters[2]);
      renderCharacters();
      renderWeeks();
      restoreTeacherPanel();
      updateMusicButton();
      updateTeacherResults();
      syncPendingScores();
      window.addEventListener("online", syncPendingScores);
      document.addEventListener("pointerdown", maybeStartMusic, { passive: true });
    }

    function pokemonImageMarkup(character) {
      return `<img class="pokemon-img" src="${safeAttr(character.image)}" alt="${safeAttr(character.name)}">`;
    }

    function setPokemonImage(element, character) {
      element.src = character.image;
      element.alt = character.name;
      element.dataset.creature = character.id;
    }

    function renderCharacters() {
      dom.characterGrid.innerHTML = characters.map((character) => `
        <button class="choice-card${character.id === state.characterId ? " selected" : ""}" type="button" data-character="${safeAttr(character.id)}">
          <span class="avatar-shell">${pokemonImageMarkup(character)}</span>
          <strong>${safeText(character.name)}</strong>
          <span>${safeText(character.label)}</span>
        </button>
      `).join("");
    }

    function renderWeeks() {
      dom.weekGrid.innerHTML = Object.entries(weeks).map(([id, week]) => `
        <button class="option-button ${week.buttonClass}" type="button" data-week="${safeAttr(id)}">
          <strong>${safeText(week.label)}</strong>
          <span>${week.words.length} words</span>
        </button>
      `).join("");
    }

    function restoreTeacherPanel() {
      if (!TEACHER_MODE) {
        return;
      }
      dom.teacherPanel.classList.add("visible");
      dom.scriptUrlInput.value = getAppsScriptUrl();
    }

    function showScreen(id) {
      dom.screens.forEach((screen) => screen.classList.toggle("active", screen.id === id));
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function startGame() {
      state.order = shuffle(weeks[state.weekId].words);
      state.index = 0;
      state.lives = MAX_LIVES;
      state.score = 0;
      state.correct = 0;
      state.wrong = 0;
      state.startedAt = Date.now();
      setBattleImages();
      updateHud();
      showScreen("gameScreen");
      loadQuestion();
    }

    function setBattleImages() {
      const selected = getCharacter();
      const rivals = characters.filter((character) => character.id !== selected.id);
      const rival = rivals[(state.index + state.weekId.length) % rivals.length];
      setPokemonImage(dom.battleHero, selected);
      setPokemonImage(dom.battleRival, rival);
    }

    function loadQuestion() {
      state.current = state.order[state.index];
      state.selectedLetters = [];
      state.choicesLocked = false;
      dom.feedback.textContent = "";
      dom.feedback.className = "feedback";
      updateHud();
      updateProgress();
      setBattleImages();

      if (state.mode === "spelling") {
        dom.spellingArea.classList.remove("hidden");
        dom.listeningArea.classList.add("hidden");
        dom.promptTitle.textContent = state.current.zh;
        dom.promptSub.textContent = `${weeks[state.weekId].label} - Spell the English word.`;
        setupSpelling();
      } else {
        dom.spellingArea.classList.add("hidden");
        dom.listeningArea.classList.remove("hidden");
        dom.promptTitle.textContent = "Listen and choose";
        dom.promptSub.textContent = `${weeks[state.weekId].label} - British English sound.`;
        setupListening();
        setTimeout(playCurrentAudio, 250);
      }
    }

    function setupSpelling() {
      const chars = Array.from(state.current.word);
      state.letterTiles = shuffle(chars.map((char, index) => ({
        id: `${state.current.id}-${index}`,
        char,
        used: false
      })));
      renderAnswer();
      renderLetterTiles();
    }

    function renderAnswer() {
      const targetChars = Array.from(state.current.word);
      dom.answerDisplay.innerHTML = targetChars.map((targetChar, index) => {
        const typed = state.selectedLetters[index];
        if (targetChar === " ") {
          return `<span class="answer-slot answer-space">${typed ? "&nbsp;" : ""}</span>`;
        }
        return `<span class="answer-slot">${typed ? safeText(typed.display) : ""}</span>`;
      }).join("");
    }

    function renderLetterTiles() {
      dom.letterGrid.innerHTML = state.letterTiles.map((tile) => {
        const label = tile.char === " " ? "Space" : tile.char;
        return `<button class="letter-tile${tile.used ? " used" : ""}" type="button" data-tile="${safeAttr(tile.id)}" ${tile.used ? "disabled" : ""}>${safeText(label)}</button>`;
      }).join("");
    }

    function setupListening() {
      const pool = weeks[state.weekId].words.filter((candidate) => candidate.id !== state.current.id);
      const options = shuffle([state.current, ...shuffle(pool).slice(0, 2)]);
      dom.choiceList.innerHTML = options.map((option) => `
        <button class="choice-button" type="button" data-answer="${safeAttr(option.id)}">
          ${safeText(option.word)}
        </button>
      `).join("");
    }

    function selectTile(tileId) {
      const tile = state.letterTiles.find((item) => item.id === tileId);
      if (!tile || tile.used) {
        return;
      }
      const answerLength = Array.from(state.current.word).length;
      if (state.selectedLetters.length >= answerLength) {
        return;
      }
      tile.used = true;
      state.selectedLetters.push({ tileId: tile.id, value: tile.char, display: tile.char === " " ? " " : tile.char });
      renderAnswer();
      renderLetterTiles();
    }

    function backLetter() {
      const last = state.selectedLetters.pop();
      if (last) {
        const tile = state.letterTiles.find((item) => item.id === last.tileId);
        if (tile) {
          tile.used = false;
        }
      }
      renderAnswer();
      renderLetterTiles();
    }

    function clearLetters() {
      state.selectedLetters = [];
      state.letterTiles.forEach((tile) => {
        tile.used = false;
      });
      renderAnswer();
      renderLetterTiles();
    }

    function checkSpelling() {
      const answer = state.selectedLetters.map((item) => item.value).join("");
      if (answer.length !== state.current.word.length) {
        showFeedback("Finish the word first.", "bad");
        return;
      }
      handleAnswer(answer === state.current.word);
    }

    function chooseListening(answerId) {
      if (state.choicesLocked) {
        return;
      }
      state.choicesLocked = true;
      handleAnswer(answerId === state.current.id);
    }

    function handleAnswer(isCorrect) {
      if (isCorrect) {
        state.score += 10;
        state.correct += 1;
        showFeedback(`Correct! ${state.current.word}`, "good");
      } else {
        state.wrong += 1;
        state.lives = Math.max(0, state.lives - 1);
        showFeedback(`Try next. Answer: ${state.current.word}`, "bad");
      }
      updateHud();

      setTimeout(() => {
        if (state.lives <= 0 || state.index >= state.order.length - 1) {
          finishGame();
          return;
        }
        state.index += 1;
        loadQuestion();
      }, 880);
    }

    function finishGame() {
      const totalQuestions = state.order.length;
      const maxScore = totalQuestions * 10;
      const percent = maxScore ? Math.round((state.score / maxScore) * 100) : 0;
      const result = {
        id: `${GAME_ID}-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
        clientTime: new Date().toISOString(),
        submittedAt: new Date().toISOString(),
        studentName: state.studentName,
        name: state.studentName,
        character: getCharacter().name,
        week: weeks[state.weekId].label,
        mode: state.mode === "spelling" ? "Spelling" : "Listening",
        score: state.score,
        maxScore,
        percent,
        correct: state.correct,
        wrong: state.wrong,
        livesLeft: state.lives,
        lives: state.lives,
        totalQuestions,
        total: totalQuestions,
        durationSeconds: Math.max(0, Math.round((Date.now() - state.startedAt) / 1000)),
        grade: "BIP",
        gameId: GAME_ID,
        gameTitle: GAME_TITLE,
        sheetName: SHEET_NAME,
        spreadsheetId: SPREADSHEET_ID,
        userAgent: navigator.userAgent
      };

      saveResult(result);
      dom.scoreBig.textContent = `${state.score}`;
      dom.resultGrid.innerHTML = `
        <div class="result-item"><strong>Name</strong><br>${safeText(result.studentName)}</div>
        <div class="result-item"><strong>Week</strong><br>${safeText(result.week)}</div>
        <div class="result-item"><strong>Mode</strong><br>${safeText(result.mode)}</div>
        <div class="result-item"><strong>Score</strong><br>${result.score}/${result.maxScore}</div>
        <div class="result-item"><strong>Correct</strong><br>${result.correct}</div>
        <div class="result-item"><strong>Wrong</strong><br>${result.wrong}</div>
        <div class="result-item"><strong>Percent</strong><br>${result.percent}%</div>
        <div class="result-item"><strong>HP Left</strong><br>${result.livesLeft}</div>
      `;
      dom.resultSync.textContent = "Saving score...";
      showScreen("resultScreen");
      submitResult(result).then((ok) => {
        dom.resultSync.textContent = ok ? "Score saved to Google Sheet." : "Saved on this device. It will retry when online.";
        dom.syncChip.textContent = ok ? "Score synced" : "Pending sync";
        updateTeacherResults();
      });
    }

    function updateHud() {
      dom.studentChip.textContent = state.studentName ? `Trainer: ${state.studentName}` : "Trainer: -";
      dom.hudName.textContent = `${state.studentName || "Trainer"} - ${getCharacter().name}`;
      dom.hudWeek.textContent = weeks[state.weekId].short;
      dom.hudLives.textContent = `HP ${"♥".repeat(state.lives)}${"♡".repeat(MAX_LIVES - state.lives)}`;
      dom.hudScore.textContent = `Score ${state.score}`;
    }

    function updateProgress() {
      const total = state.order.length || 1;
      const value = Math.round(((state.index + 1) / total) * 100);
      dom.progressBar.style.width = `${value}%`;
    }

    function showFeedback(message, type) {
      dom.feedback.textContent = message;
      dom.feedback.className = `feedback ${type}`;
    }

    function playCurrentAudio() {
      playWord(state.current.word);
    }

    function playWord(word) {
      if (audioElement) {
        audioElement.pause();
      }
      audioElement = new Audio(`${YOUDAO_AUDIO_BASE}${encodeURIComponent(word)}`);
      audioElement.addEventListener("error", () => speakWord(word), { once: true });
      audioElement.play().catch(() => speakWord(word));
    }

    function speakWord(word) {
      if (!("speechSynthesis" in window)) {
        return;
      }
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(word);
      utterance.lang = "en-GB";
      utterance.rate = 0.82;
      window.speechSynthesis.speak(utterance);
    }

    function saveResult(result) {
      const results = readJson(RESULT_KEY, []);
      results.unshift(result);
      localStorage.setItem(RESULT_KEY, JSON.stringify(results.slice(0, 50)));
      const pending = readJson(PENDING_KEY, []);
      pending.push(result);
      localStorage.setItem(PENDING_KEY, JSON.stringify(pending));
    }

    async function submitResult(result) {
      const ok = await postScore(result);
      if (ok) {
        removePending(result.id);
      }
      return ok;
    }

    async function syncPendingScores() {
      const pending = readJson(PENDING_KEY, []);
      if (!pending.length) {
        dom.syncChip.textContent = "Scores ready";
        return true;
      }
      let successCount = 0;
      for (const result of pending) {
        if (await postScore(result)) {
          successCount += 1;
          removePending(result.id);
        }
      }
      const remaining = readJson(PENDING_KEY, []).length;
      dom.syncChip.textContent = remaining ? `${remaining} pending` : "Scores synced";
      return successCount > 0 && remaining === 0;
    }

    async function postScore(result) {
      const url = getAppsScriptUrl();
      if (!url) {
        return false;
      }
      try {
        await fetch(url, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(result)
        });
        return true;
      } catch (error) {
        return false;
      }
    }

    function removePending(id) {
      const pending = readJson(PENDING_KEY, []);
      localStorage.setItem(PENDING_KEY, JSON.stringify(pending.filter((item) => item.id !== id)));
    }

    function getAppsScriptUrl() {
      return localStorage.getItem(SCRIPT_URL_KEY) || DEFAULT_APPS_SCRIPT_URL;
    }

    function readJson(key, fallback) {
      try {
        const value = JSON.parse(localStorage.getItem(key) || "");
        return value || fallback;
      } catch (error) {
        return fallback;
      }
    }

    function getCharacter() {
      return characters.find((character) => character.id === state.characterId) || characters[0];
    }

    function shuffle(items) {
      const copy = [...items];
      for (let index = copy.length - 1; index > 0; index -= 1) {
        const swapIndex = Math.floor(Math.random() * (index + 1));
        [copy[index], copy[swapIndex]] = [copy[swapIndex], copy[index]];
      }
      return copy;
    }

    function safeText(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function safeAttr(value) {
      return safeText(value);
    }

    function updateTeacherResults() {
      if (!TEACHER_MODE) {
        return;
      }
      const rows = readJson(RESULT_KEY, []).slice(0, 8);
      dom.teacherResultsBody.innerHTML = rows.map((row) => `
        <tr>
          <td>${safeText(row.studentName || row.name || "")}</td>
          <td>${safeText(row.week || "")}</td>
          <td>${safeText(row.mode || "")}</td>
          <td>${safeText(`${row.score}/${row.maxScore}`)}</td>
        </tr>
      `).join("");
      dom.teacherStatus.textContent = `Pending: ${readJson(PENDING_KEY, []).length}`;
    }

    function saveTeacherUrl() {
      const value = dom.scriptUrlInput.value.trim();
      if (value) {
        localStorage.setItem(SCRIPT_URL_KEY, value);
        dom.teacherStatus.textContent = "Saved Apps Script URL.";
      } else {
        localStorage.removeItem(SCRIPT_URL_KEY);
        dom.teacherStatus.textContent = "Using default Apps Script URL.";
      }
    }

    function updateMusicButton() {
      dom.musicToggle.classList.toggle("is-off", !musicOn);
      dom.musicToggle.textContent = musicOn ? "♪" : "×";
      localStorage.setItem(MUSIC_KEY, musicOn ? "on" : "off");
    }

    function maybeStartMusic() {
      if (musicOn) {
        startMusic();
      }
    }

    function toggleMusic() {
      musicOn = !musicOn;
      updateMusicButton();
      if (musicOn) {
        startMusic();
      } else {
        stopMusic();
      }
    }

    function startMusic() {
      if (musicTimer) {
        return;
      }
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) {
        return;
      }
      musicContext = musicContext || new AudioContext();
      if (musicContext.state === "suspended") {
        musicContext.resume();
      }
      let step = 0;
      const notes = [392, 523.25, 659.25, 587.33, 523.25, 440, 392, 329.63];
      const playNote = () => {
        if (!musicOn || !musicContext) {
          return;
        }
        const now = musicContext.currentTime;
        const osc = musicContext.createOscillator();
        const gain = musicContext.createGain();
        osc.type = step % 4 === 0 ? "triangle" : "sine";
        osc.frequency.value = notes[step % notes.length];
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.035, now + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.38);
        osc.connect(gain).connect(musicContext.destination);
        osc.start(now);
        osc.stop(now + 0.42);
        step += 1;
      };
      playNote();
      musicTimer = window.setInterval(playNote, 360);
    }

    function stopMusic() {
      if (musicTimer) {
        window.clearInterval(musicTimer);
        musicTimer = null;
      }
    }

    dom.nameForm.addEventListener("submit", (event) => {
      event.preventDefault();
      state.studentName = dom.studentName.value.trim();
      if (!state.studentName) {
        return;
      }
      maybeStartMusic();
      updateHud();
      showScreen("characterScreen");
    });

    dom.characterGrid.addEventListener("click", (event) => {
      const button = event.target.closest("[data-character]");
      if (!button) {
        return;
      }
      state.characterId = button.dataset.character;
      renderCharacters();
      showScreen("weekScreen");
    });

    dom.weekGrid.addEventListener("click", (event) => {
      const button = event.target.closest("[data-week]");
      if (!button) {
        return;
      }
      state.weekId = button.dataset.week;
      showScreen("modeScreen");
    });

    document.getElementById("modeScreen").addEventListener("click", (event) => {
      const button = event.target.closest("[data-mode]");
      if (!button) {
        return;
      }
      state.mode = button.dataset.mode;
      startGame();
    });

    document.addEventListener("click", (event) => {
      const back = event.target.closest("[data-back]");
      if (back) {
        showScreen(back.dataset.back);
      }
    });

    dom.letterGrid.addEventListener("click", (event) => {
      const button = event.target.closest("[data-tile]");
      if (button) {
        selectTile(button.dataset.tile);
      }
    });

    dom.backLetter.addEventListener("click", backLetter);
    dom.clearLetters.addEventListener("click", clearLetters);
    dom.checkSpelling.addEventListener("click", checkSpelling);
    dom.playAudio.addEventListener("click", playCurrentAudio);
    dom.choiceList.addEventListener("click", (event) => {
      const button = event.target.closest("[data-answer]");
      if (button) {
        chooseListening(button.dataset.answer);
      }
    });
    dom.playAgain.addEventListener("click", () => showScreen("weekScreen"));
    dom.newPlayer.addEventListener("click", () => {
      state.studentName = "";
      dom.studentName.value = "";
      updateHud();
      showScreen("startScreen");
    });
    dom.musicToggle.addEventListener("click", toggleMusic);
    dom.saveScriptUrl.addEventListener("click", saveTeacherUrl);
    dom.syncNow.addEventListener("click", () => {
      dom.teacherStatus.textContent = "Syncing...";
      syncPendingScores().then(() => updateTeacherResults());
    });
  </script>
</body>
</html>
