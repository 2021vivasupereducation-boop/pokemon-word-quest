<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Pokemon 华文对战：拼音与部首挑战</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='28' fill='%23fff' stroke='%23182236' stroke-width='4'/%3E%3Cpath d='M6 32a26 26 0 0 1 52 0z' fill='%23df342f'/%3E%3Cpath d='M4 32h56' stroke='%23182236' stroke-width='5'/%3E%3Ccircle cx='32' cy='32' r='10' fill='%23fff' stroke='%23182236' stroke-width='4'/%3E%3C/svg%3E">
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap");

    :root {
      --kid-letter-font: "Comic Neue", "Comic Sans MS", "Chalkboard SE", "Marker Felt";
      --sky: #73d6ff;
      --sky-deep: #2082cf;
      --grass: #52bf4a;
      --grass-dark: #20823b;
      --soil: #a7612e;
      --brick: #d85d2a;
      --brick-dark: #9f321e;
      --coin: #ffd64b;
      --coin-dark: #bd8300;
      --red: #df342f;
      --green: #1e9d55;
      --blue: #2374d8;
      --cream: #fff5d1;
      --paper: #fffefa;
      --ink: #182236;
      --muted: #5d6676;
      --line: #202634;
      --danger: #ce2f25;
      --shadow: 0 8px 0 rgba(27, 38, 56, 0.18);
      --panel-shadow: 0 12px 26px rgba(23, 38, 58, 0.22);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body,
    button,
    input,
    select,
    textarea,
    .pinyin,
    .choice-button {
      font-family: var(--kid-letter-font), "Noto Sans SC", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      letter-spacing: 0;
    }

    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 14% 14%, rgba(255, 255, 255, 0.92) 0 24px, transparent 25px),
        radial-gradient(circle at 20% 13%, rgba(255, 255, 255, 0.92) 0 33px, transparent 34px),
        radial-gradient(circle at 80% 15%, rgba(255, 255, 255, 0.82) 0 36px, transparent 37px),
        linear-gradient(180deg, var(--sky) 0%, #9ee8ff 58%, #7cd85d 58%, var(--grass) 100%);
      overflow-x: hidden;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.58;
    }

    .app {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: max(14px, env(safe-area-inset-top)) clamp(10px, 2.4vw, 24px) max(18px, env(safe-area-inset-bottom));
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-badge {
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      width: 46px;
      height: 46px;
      border: 3px solid var(--line);
      border-radius: 50%;
      background: var(--red);
      color: #fff;
      box-shadow: 0 5px 0 var(--brick-dark);
      font-size: 1.4rem;
      line-height: 1;
    }

    h1 {
      margin: 0;
      color: #fff7db;
      text-shadow: 0 3px 0 #14213d, 2px 5px 0 rgba(0, 0, 0, 0.18);
      font-size: clamp(1.45rem, 4.2vw, 3rem);
      line-height: 1;
      overflow-wrap: anywhere;
    }

    h2,
    h3,
    p {
      margin-top: 0;
    }

    .mini-status {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 6px 10px;
      border: 3px solid var(--line);
      border-radius: 999px;
      background: var(--cream);
      box-shadow: 0 4px 0 rgba(0, 0, 0, 0.14);
      color: #13213a;
      font-size: clamp(0.92rem, 2.5vw, 1.08rem);
      white-space: nowrap;
    }

    .music-toggle {
      width: 42px;
      min-width: 42px;
      padding: 0;
      background: linear-gradient(180deg, #ffe773, var(--coin));
      color: #5b3500;
      font-size: 1.18rem;
    }

    .music-toggle.is-off {
      background: rgba(255, 255, 255, 0.76);
      color: var(--muted);
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    .panel {
      position: relative;
      border: 4px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
      box-shadow: var(--shadow), var(--panel-shadow);
      overflow: hidden;
    }

    .panel::before {
      content: "";
      display: block;
      height: 22px;
      border-bottom: 4px solid var(--line);
      background:
        linear-gradient(90deg, transparent 0 18px, rgba(0, 0, 0, 0.18) 18px 21px, transparent 21px 39px),
        linear-gradient(180deg, #f77a38, var(--brick));
    }

    .panel-body {
      padding: clamp(16px, 3.4vw, 28px);
    }

    .section-title {
      margin: 0 0 14px;
      color: #10243f;
      font-size: clamp(1.55rem, 4.4vw, 2.35rem);
      line-height: 1.05;
    }

    .start-layout,
    .game-shell {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(290px, 0.95fr);
      gap: clamp(14px, 2.8vw, 26px);
      align-items: stretch;
    }

    .scene {
      position: relative;
      min-height: 360px;
      border: 4px solid var(--line);
      border-radius: var(--radius);
      background:
        radial-gradient(circle at 18% 18%, #fff 0 24px, transparent 25px),
        radial-gradient(circle at 25% 17%, #fff 0 35px, transparent 36px),
        radial-gradient(circle at 74% 20%, #fff 0 26px, transparent 27px),
        radial-gradient(circle at 82% 19%, #fff 0 38px, transparent 39px),
        linear-gradient(180deg, #8ce3ff 0 64%, #67cb50 64% 100%);
      box-shadow: inset 0 -12px 0 rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .scene::before {
      content: "";
      position: absolute;
      left: -6%;
      right: -6%;
      bottom: 43px;
      height: 110px;
      background:
        radial-gradient(ellipse at 18% 100%, #37a84c 0 74px, transparent 75px),
        radial-gradient(ellipse at 47% 100%, #8dd86a 0 102px, transparent 103px),
        radial-gradient(ellipse at 77% 100%, #2e9843 0 88px, transparent 89px);
      z-index: 0;
    }

    .scene::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 56px;
      border-top: 4px solid var(--line);
      background:
        linear-gradient(90deg, rgba(0, 0, 0, 0.18) 0 3px, transparent 3px 42px) 0 0 / 42px 100%,
        linear-gradient(180deg, #c87c3d, var(--soil));
      z-index: 1;
    }

    .pipe {
      position: absolute;
      right: 9%;
      bottom: 56px;
      width: 90px;
      height: 98px;
      border: 4px solid var(--line);
      border-bottom: 0;
      border-radius: 6px 6px 0 0;
      background: linear-gradient(90deg, #2c9d4e 0 30%, #61df80 30% 64%, #19753d 64%);
      z-index: 3;
    }

    .pipe::before {
      content: "";
      position: absolute;
      left: -14px;
      right: -14px;
      top: -25px;
      height: 34px;
      border: 4px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(90deg, #2a9a4c 0 32%, #66e184 32% 63%, #16713a 63%);
    }

    .question-block {
      position: absolute;
      top: 22%;
      right: 27%;
      display: grid;
      place-items: center;
      width: 64px;
      height: 64px;
      border: 4px solid var(--line);
      border-radius: 6px;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.32) 0 14%, transparent 14% 86%, rgba(0, 0, 0, 0.08) 86%),
        var(--coin);
      box-shadow: 0 7px 0 var(--coin-dark);
      color: #684000;
      font-size: 2.65rem;
      z-index: 2;
      transition: transform 160ms ease;
    }

    .question-block.bump {
      transform: translateY(-15px);
    }

    .coin-row {
      position: absolute;
      top: 35%;
      left: 12%;
      display: flex;
      gap: 10px;
      z-index: 2;
    }

    .coin {
      width: 34px;
      height: 34px;
      border: 4px solid var(--line);
      border-radius: 50%;
      background: radial-gradient(circle at 36% 30%, #fff4a2 0 18%, transparent 19%), var(--coin);
      box-shadow: inset -5px -7px 0 rgba(174, 117, 0, 0.25), 0 4px 0 rgba(0, 0, 0, 0.14);
    }

    .coin.pop {
      animation: coin-pop 420ms ease;
    }

    @keyframes coin-pop {
      45% { transform: translateY(-24px) scale(1.12); }
      100% { transform: translateY(0) scale(1); }
    }

    .castle {
      position: absolute;
      right: 6%;
      bottom: 56px;
      width: 96px;
      height: 112px;
      border: 4px solid var(--line);
      border-bottom: 0;
      background: linear-gradient(180deg, #8d6d5b, #5d463d);
      z-index: 2;
    }

    .castle::before,
    .castle::after {
      content: "";
      position: absolute;
      top: -38px;
      width: 42px;
      height: 54px;
      border: 4px solid var(--line);
      background: #7f5d50;
    }

    .castle::before {
      left: -20px;
    }

    .castle::after {
      right: -20px;
    }

    .boss {
      position: absolute;
      right: 13%;
      bottom: 56px;
      width: 82px;
      height: 72px;
      border: 4px solid var(--line);
      border-radius: 44% 44% 8px 8px;
      background: linear-gradient(180deg, #f2b13d, #b66d22);
      box-shadow: inset 0 -12px 0 rgba(0, 0, 0, 0.12);
      z-index: 4;
      transition: transform 160ms ease;
    }

    .boss::before,
    .boss::after {
      content: "";
      position: absolute;
      top: -13px;
      width: 22px;
      height: 22px;
      border: 4px solid var(--line);
      border-radius: 50% 50% 0 50%;
      background: #fff2b7;
    }

    .boss::before {
      left: 9px;
      transform: rotate(-38deg);
    }

    .boss::after {
      right: 9px;
      transform: rotate(128deg);
    }

    .boss-face {
      position: absolute;
      inset: 17px 14px auto;
      display: flex;
      justify-content: space-between;
    }

    .boss-eye {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--line);
      box-shadow: 0 17px 0 -5px var(--danger);
    }

    .boss.hit {
      transform: translateX(12px) rotate(4deg);
    }

    .runner {
      position: absolute;
      left: 8%;
      bottom: 56px;
      width: 106px;
      height: 136px;
      z-index: 5;
      transition: left 420ms ease;
    }

    .runner.jump {
      animation: hero-jump 460ms ease;
    }

    @keyframes hero-jump {
      45% { transform: translateY(-34px); }
      100% { transform: translateY(0); }
    }

    .avatar {
      --cap: #df342f;
      --shirt: #df342f;
      --overalls: #2374d8;
      position: relative;
      width: 86px;
      height: 118px;
      margin: 0 auto;
    }

    .avatar.small {
      width: 70px;
      height: 96px;
    }

    .avatar.photo {
      display: grid;
      place-items: end center;
      width: 96px;
      height: 126px;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      overflow: hidden;
    }

    .avatar.photo.small {
      width: 82px;
      height: 104px;
    }

    .avatar.photo .character-img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center bottom;
      filter: drop-shadow(0 4px 2px rgba(0, 0, 0, 0.16));
    }

    .runner .avatar.photo {
      width: 108px;
      height: 134px;
      border-radius: 0;
      background: transparent;
    }

    .avatar .cap {
      position: absolute;
      left: 12%;
      top: 0;
      width: 76%;
      height: 35%;
      border: 4px solid var(--line);
      border-radius: 44% 44% 18% 18%;
      background: var(--cap);
      z-index: 3;
    }

    .avatar .cap::after {
      content: attr(data-letter);
      position: absolute;
      left: 50%;
      top: 42%;
      display: grid;
      place-items: center;
      width: 24px;
      height: 24px;
      border: 3px solid var(--line);
      border-radius: 50%;
      background: white;
      color: var(--cap);
      font-size: 0.9rem;
      transform: translate(-50%, -50%);
    }

    .avatar .face {
      position: absolute;
      left: 18%;
      top: 25%;
      width: 64%;
      height: 37%;
      border: 4px solid var(--line);
      border-radius: 46% 46% 42% 42%;
      background: #ffc58d;
      z-index: 2;
    }

    .avatar .face::before {
      content: "";
      position: absolute;
      left: 20%;
      top: 34%;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--line);
      box-shadow: 28px 0 0 var(--line), 14px 17px 0 -2px #8e3d1d;
    }

    .avatar .body {
      position: absolute;
      left: 18%;
      top: 56%;
      width: 64%;
      height: 35%;
      border: 4px solid var(--line);
      border-radius: 14px 14px 10px 10px;
      background:
        linear-gradient(90deg, transparent 0 20%, var(--overalls) 20% 38%, transparent 38% 62%, var(--overalls) 62% 80%, transparent 80%),
        var(--shirt);
      z-index: 1;
    }

    .avatar .body::before,
    .avatar .body::after {
      content: "";
      position: absolute;
      bottom: -22px;
      width: 19px;
      height: 27px;
      border: 4px solid var(--line);
      border-radius: 0 0 8px 8px;
      background: #5a331e;
    }

    .avatar .body::before {
      left: 7px;
    }

    .avatar .body::after {
      right: 7px;
    }

    .start-copy p {
      color: var(--muted);
      font-size: clamp(1rem, 2.8vw, 1.15rem);
      line-height: 1.35;
    }

    .form-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: stretch;
      margin-top: 12px;
    }

    .name-input,
    .teacher-grid input {
      width: 100%;
      min-height: 54px;
      border: 3px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      padding: 10px 12px;
      font-size: clamp(1.08rem, 3.2vw, 1.28rem);
      min-width: 0;
    }

    .btn,
    .option-button,
    .choice-card,
    .choice-button {
      border: 3px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 5px 0 rgba(0, 0, 0, 0.18);
      color: var(--ink);
    }

    .btn {
      min-height: 48px;
      padding: 9px 14px;
      background: #fff;
      font-size: clamp(1rem, 2.8vw, 1.14rem);
    }

    .btn.primary {
      background: linear-gradient(180deg, #ff6a60, var(--red));
      color: white;
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.2);
    }

    .btn.green {
      background: linear-gradient(180deg, #80e989, #27b95d);
    }

    .btn.blue {
      background: linear-gradient(180deg, #79c9ff, var(--blue));
      color: white;
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.18);
    }

    .btn.gold {
      background: linear-gradient(180deg, #fff180, var(--coin));
    }

    .btn.ghost {
      background: rgba(255, 255, 255, 0.78);
    }

    .screen-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .choice-grid,
    .option-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .choice-card {
      display: grid;
      justify-items: center;
      gap: 8px;
      min-height: 170px;
      padding: 14px 10px;
      background: linear-gradient(180deg, #fff, #eef8ff);
      text-align: center;
    }

    .choice-card strong,
    .option-button strong {
      display: block;
      font-size: clamp(1.18rem, 3.4vw, 1.48rem);
      line-height: 1.05;
      overflow-wrap: anywhere;
    }

    .choice-card span,
    .option-button span {
      color: var(--muted);
      font-size: clamp(0.94rem, 2.7vw, 1.05rem);
      line-height: 1.2;
      overflow-wrap: anywhere;
    }

    .option-button {
      min-height: 126px;
      padding: 14px;
      background: linear-gradient(180deg, #fff, #fff1bd);
      text-align: left;
    }

    .option-button[data-mode="radical"] {
      background: linear-gradient(180deg, #fff, #e1ffe7);
    }

    .option-button[data-mode="mix"] {
      background: linear-gradient(180deg, #fff, #e9efff);
    }

    .game-shell {
      align-items: start;
    }

    .play-scene {
      min-height: 440px;
      transition: transform 130ms ease;
    }

    .race-scene {
      background:
        radial-gradient(circle at 16% 18%, #fff 0 22px, transparent 23px),
        radial-gradient(circle at 23% 17%, #fff 0 34px, transparent 35px),
        radial-gradient(circle at 78% 17%, #fff 0 26px, transparent 27px),
        linear-gradient(180deg, #86dcff 0 48%, #89d965 48% 63%, #5ca545 63% 100%);
    }

    .race-scene::before {
      bottom: 118px;
      height: 120px;
      background:
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.5) 0 18px, transparent 18px 36px),
        linear-gradient(180deg, #b34339, #f2d679 42%, #60a850 42%);
      border-top: 4px solid rgba(32, 38, 52, 0.45);
      border-bottom: 4px solid rgba(32, 38, 52, 0.45);
      opacity: 0.86;
    }

    .race-scene::after {
      height: 122px;
      border-top: 4px solid var(--line);
      background:
        repeating-linear-gradient(90deg, transparent 0 30px, rgba(255, 255, 255, 0.72) 30px 60px),
        linear-gradient(180deg, #784235 0 20%, #b85b3f 20% 48%, #f6d479 48% 53%, #b85b3f 53% 80%, #784235 80%);
      z-index: 1;
    }

    .race-lane,
    .speed-line,
    .finish-flag {
      position: absolute;
      pointer-events: none;
      z-index: 2;
    }

    .race-lane {
      left: 0;
      right: 0;
      bottom: 86px;
      height: 4px;
      background: rgba(255, 244, 178, 0.8);
      box-shadow: 0 42px 0 rgba(255, 244, 178, 0.75);
    }

    .speed-line {
      left: -20%;
      width: 64px;
      height: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.78);
      animation: speed-line 1.8s linear infinite;
    }

    .speed-line.one {
      top: 28%;
      animation-delay: -0.4s;
    }

    .speed-line.two {
      top: 43%;
      width: 92px;
      animation-delay: -1.1s;
    }

    .speed-line.three {
      top: 56%;
      width: 54px;
      animation-delay: -1.55s;
    }

    @keyframes speed-line {
      from { transform: translateX(0); }
      to { transform: translateX(150vw); }
    }

    .finish-flag {
      right: 8%;
      bottom: 122px;
      width: 64px;
      height: 82px;
      border-left: 6px solid var(--line);
    }

    .finish-flag::before {
      content: "";
      position: absolute;
      left: 6px;
      top: 0;
      width: 52px;
      height: 42px;
      border: 4px solid var(--line);
      background:
        conic-gradient(#fff 0 25%, #242424 0 50%, #fff 0 75%, #242424 0) 0 0 / 24px 24px;
    }

    .race-scene .castle {
      right: 4%;
      bottom: 122px;
      width: 96px;
      height: 86px;
      border-bottom: 4px solid var(--line);
      background: linear-gradient(180deg, #e8eef7, #a8b5c8);
      opacity: 0.95;
    }

    .race-scene .castle::before,
    .race-scene .castle::after {
      display: none;
    }

    .race-scene .boss {
      right: 15%;
      bottom: 122px;
    }

    .race-scene .runner {
      bottom: 116px;
    }

    .race-scene .coin-row {
      top: 22%;
      left: 42%;
    }

    .race-scene .question-block {
      top: 24%;
      right: 31%;
    }

    .play-scene.shake {
      animation: scene-shake 240ms ease;
    }

    @keyframes scene-shake {
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-3px); }
      100% { transform: translateX(0); }
    }

    .hud {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }

    .hud .chip,
    .hud .pause-chip {
      min-width: 0;
      overflow-wrap: anywhere;
      white-space: normal;
    }

    .pause-chip {
      min-height: 36px;
      padding: 6px 10px;
      background: linear-gradient(180deg, #fff, #e9f6ff);
      font-size: clamp(0.92rem, 2.5vw, 1.08rem);
    }

    .question-panel {
      border: 4px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 254, 250, 0.96);
      box-shadow: var(--shadow);
      padding: clamp(12px, 2.8vw, 18px);
    }

    .progress-track {
      height: 18px;
      border: 3px solid var(--line);
      border-radius: 999px;
      background: #e7edf6;
      overflow: hidden;
      margin-bottom: 14px;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #37c960, #ffe066);
      transition: width 260ms ease;
    }

    .boss-track {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 8px;
      align-items: center;
      margin-bottom: 12px;
      color: #3a2531;
      font-size: clamp(0.95rem, 2.6vw, 1.05rem);
    }

    .boss-bar {
      height: 14px;
      border: 3px solid var(--line);
      border-radius: 999px;
      background: #fff;
      overflow: hidden;
    }

    .boss-fill {
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, #d7322e, #ff8b3d);
      transition: width 260ms ease;
    }

    .prompt-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }

    .prompt-badge {
      display: grid;
      place-items: center;
      width: 76px;
      height: 76px;
      border: 4px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, #fffdf0, #ffe585);
      box-shadow: 0 5px 0 rgba(0, 0, 0, 0.16);
      font-size: clamp(2.2rem, 8vw, 3.3rem);
      line-height: 1;
    }

    .prompt-badge.word-badge {
      width: auto;
      min-width: 76px;
      padding: 0 10px;
      font-size: clamp(1.55rem, 6vw, 2.65rem);
    }

    .prompt-title {
      margin: 0;
      color: #10243f;
      font-size: clamp(1.45rem, 4.5vw, 2.3rem);
      line-height: 1.08;
      overflow-wrap: anywhere;
    }

    .prompt-sub {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: clamp(0.98rem, 2.9vw, 1.13rem);
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .choice-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .listen-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin: 10px 0 4px;
    }

    .readout {
      display: inline-flex;
      align-items: center;
      min-height: 42px;
      padding: 6px 10px;
      border: 3px solid var(--line);
      border-radius: var(--radius);
      background: #fff8d7;
      color: #2d3344;
      font-size: clamp(1.05rem, 3vw, 1.22rem);
    }

    .choice-button {
      min-height: 64px;
      padding: 10px 12px;
      background: linear-gradient(180deg, #fff, #e9f6ff);
      font-size: clamp(1.22rem, 4vw, 1.75rem);
      text-align: center;
      line-height: 1.1;
      overflow-wrap: anywhere;
    }

    .choice-button.correct {
      background: linear-gradient(180deg, #c9ffd4, #5bdd78);
    }

    .choice-button.wrong {
      background: linear-gradient(180deg, #ffd8d4, #ff7a6f);
    }

    .radical-match {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }

    .word-builders {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 8px;
    }

    .char-builder {
      display: grid;
      gap: 8px;
      padding: 8px;
      border: 3px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, #fff, #fff8d7);
    }

    .char-builder.complete {
      background: linear-gradient(180deg, #f1fff4, #d8ffe1);
    }

    .builder-line {
      display: grid;
      grid-template-columns: minmax(48px, 1fr) auto minmax(48px, 1fr) auto minmax(48px, 1fr);
      gap: 5px;
      align-items: center;
    }

    .builder-line.single-char {
      grid-template-columns: minmax(72px, 1fr) auto minmax(72px, 1fr);
    }

    .mini-component,
    .built-preview,
    .word-slot,
    .word-tile {
      display: grid;
      place-items: center;
      min-height: 60px;
      border: 3px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      line-height: 1;
    }

    .mini-component {
      gap: 2px;
      padding: 7px 4px;
      background: linear-gradient(180deg, #fffdf0, #ffe585);
    }

    .mini-component .component-pinyin,
    .slot-pinyin,
    .word-tile .component-pinyin {
      color: #606a7a;
      font-size: clamp(0.74rem, 2.2vw, 0.92rem);
      line-height: 1;
    }

    .mini-component .component-char,
    .built-preview,
    .word-slot .slot-value,
    .word-tile .word-char {
      font-size: clamp(1.8rem, 7vw, 2.55rem);
      line-height: 1;
    }

    .built-preview {
      color: #7b8494;
      background: #f5f8ff;
    }

    .built-preview.complete {
      color: var(--ink);
      background: linear-gradient(180deg, #d8ffe1, #72e586);
    }

    .word-assembly {
      display: grid;
      gap: 10px;
      padding-top: 4px;
    }

    .word-slots,
    .word-bank {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(74px, 1fr));
      gap: 8px;
    }

    .word-slot {
      min-height: 68px;
      border-style: dashed;
      background: #f5f8ff;
      transition: background 140ms ease, transform 140ms ease;
    }

    .word-slot.is-ready {
      background: #eaffef;
      transform: scale(1.01);
    }

    .word-slot.filled {
      border-style: solid;
      background: linear-gradient(180deg, #d8ffe1, #72e586);
    }

    .word-tile {
      position: relative;
      touch-action: none;
      user-select: none;
      border-width: 3px;
      background: linear-gradient(180deg, #fff, #e9f6ff);
      box-shadow: 0 5px 0 rgba(0, 0, 0, 0.18);
      color: var(--ink);
      transition: transform 80ms ease, opacity 140ms ease;
    }

    .word-tile.locked {
      opacity: 0.62;
      filter: grayscale(0.7);
    }

    .word-tile.locked > * {
      visibility: hidden;
    }

    .word-tile.locked::after {
      content: "?";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #7b8494;
      font-size: clamp(1.8rem, 7vw, 2.55rem);
      line-height: 1;
    }

    .word-tile.dragging {
      opacity: 0.92;
      position: relative;
      z-index: 50;
      box-shadow: 0 12px 22px rgba(0, 0, 0, 0.24);
    }

    .word-tile.selected {
      transform: translateY(-4px);
      outline: 4px solid rgba(35, 116, 216, 0.32);
    }

    .word-tile.correct {
      background: linear-gradient(180deg, #c9ffd4, #5bdd78);
    }

    .word-tile.wrong {
      background: linear-gradient(180deg, #ffd8d4, #ff7a6f);
    }

    .pair-line {
      display: grid;
      grid-template-columns: minmax(74px, 0.72fr) minmax(84px, 0.82fr) auto minmax(74px, 0.72fr);
      gap: 8px;
      align-items: center;
    }

    .radical-drop {
      display: grid;
      place-items: center;
      min-height: 60px;
      padding: 8px;
      border: 4px dashed #233044;
      border-radius: var(--radius);
      background: #fff;
      transition: background 140ms ease, transform 140ms ease;
    }

    .radical-drop.is-ready {
      background: #eaffef;
      transform: scale(1.01);
    }

    .radical-drop.filled {
      border-style: solid;
      background: #eaffef;
    }

    .slot-placeholder {
      color: #798292;
      font-size: clamp(1rem, 3vw, 1.15rem);
    }

    .slot-value {
      font-size: clamp(2.3rem, 9vw, 3.4rem);
      line-height: 1;
    }

    .component-card,
    .target-preview {
      display: grid;
      place-items: center;
      min-height: 96px;
      border: 4px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, #fffdf0, #ffe585);
      font-size: clamp(2.4rem, 10vw, 3.6rem);
      line-height: 1;
    }

    .component-card {
      gap: 2px;
      padding: 8px 6px;
    }

    .component-pinyin {
      color: #606a7a;
      font-size: clamp(0.82rem, 2.6vw, 1rem);
      line-height: 1;
    }

    .component-char {
      line-height: 1;
    }

    .pair-plus,
    .pair-equals {
      display: grid;
      place-items: center;
      min-width: 22px;
      color: #243044;
      font-size: clamp(1.45rem, 5vw, 2rem);
      line-height: 1;
    }

    .pair-equals {
      font-size: clamp(1.2rem, 4vw, 1.6rem);
    }

    .target-preview {
      color: #7b8494;
      background: #f5f8ff;
    }

    .target-preview.complete {
      color: var(--ink);
      background: linear-gradient(180deg, #d8ffe1, #72e586);
    }

    .radical-bank {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .radical-tile {
      touch-action: none;
      user-select: none;
      min-height: 58px;
      border: 3px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, #fff, #e9f6ff);
      box-shadow: 0 5px 0 rgba(0, 0, 0, 0.18);
      color: var(--ink);
      font-size: clamp(1.55rem, 6vw, 2.25rem);
      line-height: 1;
      transition: transform 80ms ease, opacity 140ms ease;
    }

    .radical-tile.dragging {
      opacity: 0.92;
      position: relative;
      z-index: 50;
      box-shadow: 0 12px 22px rgba(0, 0, 0, 0.24);
    }

    .radical-tile.selected {
      transform: translateY(-4px);
      outline: 4px solid rgba(35, 116, 216, 0.32);
    }

    .radical-tile.correct {
      background: linear-gradient(180deg, #c9ffd4, #5bdd78);
    }

    .radical-tile.wrong {
      background: linear-gradient(180deg, #ffd8d4, #ff7a6f);
    }

    .feedback {
      min-height: 34px;
      margin-top: 12px;
      font-size: clamp(1.05rem, 3vw, 1.24rem);
      line-height: 1.25;
      color: #243044;
    }

    .feedback.good {
      color: #126b2e;
    }

    .feedback.bad {
      color: #b32922;
    }

    .finish-card {
      text-align: center;
    }

    .score-big {
      display: inline-grid;
      place-items: center;
      width: min(250px, 72vw);
      aspect-ratio: 1;
      margin: 12px auto;
      border: 5px solid var(--line);
      border-radius: 50%;
      background: radial-gradient(circle at 38% 28%, #fff8b6 0 17%, transparent 18%), var(--coin);
      box-shadow: inset -12px -14px 0 rgba(194, 133, 0, 0.35), 0 10px 0 rgba(0, 0, 0, 0.18);
      color: #5b3300;
      font-size: clamp(2.4rem, 12vw, 4.6rem);
      line-height: 0.95;
    }

    .result-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin: 16px 0;
      text-align: left;
    }

    .result-item {
      border: 3px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      padding: 10px;
      font-size: clamp(0.98rem, 2.8vw, 1.12rem);
      overflow-wrap: anywhere;
    }

    .sync-status {
      margin-top: 10px;
      color: var(--muted);
      font-size: clamp(0.96rem, 2.7vw, 1.06rem);
      line-height: 1.3;
    }

    .pause-overlay {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(15, 25, 42, 0.58);
      z-index: 100;
    }

    .pause-overlay.visible {
      display: grid;
    }

    .pause-card {
      width: min(420px, 100%);
      border: 4px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
      box-shadow: 0 12px 0 rgba(0, 0, 0, 0.22);
      padding: 18px;
      text-align: center;
    }

    .pause-card h2 {
      margin: 0 0 14px;
      font-size: clamp(1.6rem, 6vw, 2.3rem);
    }

    .pause-actions {
      display: grid;
      gap: 10px;
    }

    .teacher-panel {
      display: none;
      margin-top: 14px;
      border: 3px solid var(--line);
      border-radius: var(--radius);
      background: #eef7ff;
      padding: 12px;
    }

    .teacher-panel.visible {
      display: block;
    }

    .teacher-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 8px;
      align-items: center;
    }

    .teacher-results {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 0.92rem;
    }

    .teacher-results th,
    .teacher-results td {
      border: 2px solid #2b3544;
      padding: 6px;
      background: white;
      text-align: left;
      vertical-align: top;
    }

    [hidden],
    .hidden {
      display: none !important;
    }

    @media (max-width: 900px) {
      .start-layout,
      .game-shell {
        grid-template-columns: 1fr;
      }

      .choice-grid,
      .option-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .scene {
        min-height: 310px;
      }

      .play-scene {
        min-height: 330px;
      }

      .mini-status {
        max-width: 50%;
      }
    }

    @media (max-width: 560px) {
      .app {
        padding-left: 8px;
        padding-right: 8px;
      }

      .topbar {
        display: grid;
        align-items: start;
      }

      .mini-status {
        max-width: none;
        justify-content: flex-start;
      }

      .brand-badge {
        width: 38px;
        height: 38px;
        font-size: 1.15rem;
      }

      .panel::before {
        height: 16px;
      }

      .panel-body {
        padding: 14px;
      }

      .form-row,
      .choice-grid,
      .option-grid,
      .result-list,
      .teacher-grid {
        grid-template-columns: 1fr;
      }

      .choice-card {
        min-height: 126px;
      }

      .choice-card .avatar.photo {
        display: grid;
        width: 68px;
        height: 84px;
      }

      .option-button {
        min-height: 96px;
      }

      .hud {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px;
      }

      .hud .chip {
        min-height: 32px;
        padding: 4px 7px;
        font-size: 0.9rem;
      }

      .prompt-row {
        grid-template-columns: auto minmax(0, 1fr);
        gap: 8px;
      }

      .prompt-badge {
        width: 56px;
        height: 56px;
        border-width: 3px;
      }

      .prompt-title {
        font-size: 1.42rem;
      }

      .choice-button {
        min-height: 58px;
        font-size: 1.18rem;
      }

      .scene {
        min-height: 250px;
      }

      .play-scene {
        min-height: 230px;
      }

      .scene::after {
        height: 42px;
      }

      .race-scene::before {
        bottom: 88px;
        height: 82px;
      }

      .race-scene::after {
        height: 90px;
      }

      .race-lane {
        bottom: 64px;
        box-shadow: 0 28px 0 rgba(255, 244, 178, 0.75);
      }

      .finish-flag {
        right: 5%;
        bottom: 90px;
        width: 48px;
        height: 62px;
      }

      .finish-flag::before {
        width: 38px;
        height: 30px;
        background-size: 18px 18px;
      }

      .pipe {
        right: 4%;
        bottom: 42px;
        width: 60px;
        height: 66px;
      }

      .pipe::before {
        left: -9px;
        right: -9px;
        top: -19px;
        height: 26px;
      }

      .question-block {
        top: 19%;
        right: 14%;
        width: 48px;
        height: 48px;
        font-size: 1.95rem;
        box-shadow: 0 5px 0 var(--coin-dark);
      }

      .coin-row {
        top: 35%;
        left: 11%;
        gap: 6px;
      }

      .coin {
        width: 28px;
        height: 28px;
        border-width: 3px;
      }

      .runner {
        bottom: 42px;
        width: 74px;
        height: 104px;
      }

      .avatar {
        width: 66px;
        height: 92px;
      }

      .runner .avatar.photo {
        width: 72px;
        height: 94px;
        border-width: 0;
        border-radius: 0;
      }

      .race-scene .runner {
        bottom: 84px;
      }

      .boss {
        right: 9%;
        bottom: 42px;
        width: 60px;
        height: 56px;
      }

      .race-scene .boss {
        right: 13%;
        bottom: 90px;
      }

      .castle {
        bottom: 42px;
        width: 66px;
        height: 82px;
      }

      .race-scene .castle {
        bottom: 90px;
        width: 58px;
        height: 54px;
      }

      .race-scene .coin-row {
        top: 28%;
        left: 35%;
      }

      .race-scene .question-block {
        top: 21%;
        right: 22%;
      }

      .radical-bank {
        gap: 8px;
      }

      .pair-line {
        grid-template-columns: minmax(58px, 0.72fr) minmax(70px, 0.82fr) auto minmax(58px, 0.72fr);
        gap: 6px;
      }

      .radical-drop,
      .component-card,
      .target-preview {
        min-height: 82px;
        border-width: 3px;
        padding: 8px 4px;
      }

      .radical-tile {
        min-height: 58px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }
  

    /* Pokemon battle theme overrides */
    :root {
      --sky: #8edbff;
      --sky-deep: #2767db;
      --grass: #4fc47d;
      --grass-dark: #1f7a51;
      --soil: #64504c;
      --brick: #e94343;
      --brick-dark: #9e1f2c;
      --coin: #ffe45d;
      --coin-dark: #b88600;
      --red: #e83e47;
      --green: #18a86b;
      --blue: #2d6cdf;
      --cream: #fff4cf;
      --paper: #fffdf5;
      --ink: #16223a;
      --muted: #5d6578;
      --line: #17223a;
      --danger: #e33842;
    }

    body {
      background:
        radial-gradient(circle at 14% 12%, rgba(255,255,255,.9) 0 26px, transparent 27px),
        radial-gradient(circle at 21% 12%, rgba(255,255,255,.88) 0 39px, transparent 40px),
        radial-gradient(circle at 82% 15%, rgba(255,255,255,.82) 0 34px, transparent 35px),
        linear-gradient(180deg, #77d4ff 0%, #b5ebff 48%, #7fd874 48%, #4fc47d 100%);
    }

    .brand-badge {
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, #ef454f 0 48%, #17223a 48% 56%, #fff 56% 100%);
      color: transparent;
      box-shadow: 0 5px 0 #0d172b;
    }

    .brand-badge::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 18px;
      height: 18px;
      border: 4px solid #17223a;
      border-radius: 50%;
      background: #fff;
      transform: translate(-50%, -50%);
    }

    .panel::before {
      background:
        linear-gradient(90deg, transparent 0 18px, rgba(255,255,255,.25) 18px 21px, transparent 21px 39px),
        linear-gradient(180deg, #ff656d, #e83e47);
    }

    .scene {
      background:
        radial-gradient(circle at 18% 16%, #fff 0 23px, transparent 24px),
        radial-gradient(circle at 25% 15%, #fff 0 34px, transparent 35px),
        radial-gradient(circle at 78% 17%, #fff 0 32px, transparent 33px),
        linear-gradient(180deg, #81dcff 0 59%, #74cf8a 59% 100%);
      box-shadow: inset 0 -16px 0 rgba(24, 40, 62, .12);
    }

    .scene::before {
      left: -4%;
      right: -4%;
      bottom: 56px;
      height: 138px;
      background:
        radial-gradient(ellipse at 18% 78%, rgba(39,103,219,.18) 0 74px, transparent 76px),
        radial-gradient(ellipse at 31% 94%, #62c577 0 96px, transparent 98px),
        radial-gradient(ellipse at 78% 92%, #52b66c 0 102px, transparent 104px),
        linear-gradient(180deg, transparent 0 42%, rgba(20,94,58,.16) 42% 100%);
      z-index: 0;
    }

    .scene::after {
      height: 72px;
      border-top-color: var(--line);
      background:
        linear-gradient(90deg, rgba(255,255,255,.22) 0 3px, transparent 3px 58px) 0 0 / 58px 100%,
        linear-gradient(180deg, #d6efe1, #89c88f 28%, #5fa86c 29% 100%);
    }

    .pipe,
    .castle,
    .finish-flag {
      display: none;
    }

    .question-block {
      top: 18%;
      right: 42%;
      width: 66px;
      height: 66px;
      border-radius: 50%;
      background: linear-gradient(180deg, #ef454f 0 47%, #17223a 47% 56%, #fff 56% 100%);
      color: transparent;
      box-shadow: 0 7px 0 rgba(23, 34, 58, .28);
    }

    .question-block::before {
      content: "?";
      display: grid;
      place-items: center;
      position: absolute;
      left: 50%;
      top: 50%;
      width: 28px;
      height: 28px;
      border: 4px solid var(--line);
      border-radius: 50%;
      background: #fff;
      color: #17223a;
      font-size: 1.4rem;
      transform: translate(-50%, -50%);
    }

    .coin {
      background: radial-gradient(circle at 36% 30%, #fff9ba 0 18%, transparent 19%), #ffe45d;
      box-shadow: inset -5px -7px 0 rgba(174,117,0,.24), 0 4px 0 rgba(0,0,0,.14);
    }

    .runner {
      bottom: 72px;
      width: 124px;
      height: 150px;
    }

    .runner .avatar.photo {
      width: 124px;
      height: 150px;
    }

    .boss {
      right: 8%;
      bottom: 72px;
      width: 142px;
      height: 148px;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      z-index: 4;
      transition: transform 160ms ease, filter 160ms ease;
    }

    .boss::before,
    .boss::after,
    .boss-face {
      display: none;
    }

    .boss .avatar.photo {
      width: 142px;
      height: 148px;
      overflow: visible;
      transform: scaleX(-1);
      filter: drop-shadow(-6px 7px 2px rgba(0,0,0,.16));
    }

    .boss.hit {
      transform: translateX(16px) rotate(4deg);
      filter: saturate(1.25);
    }

    .race-scene .runner {
      bottom: 102px;
    }

    .race-scene .boss {
      bottom: 112px;
      right: 7%;
    }

    .race-scene .question-block {
      top: 18%;
      right: 43%;
    }

    .race-scene .coin-row {
      top: 30%;
      left: 42%;
    }

    .race-lane {
      bottom: 72px;
      height: 54px;
      border-top: 4px solid rgba(23,34,58,.72);
      border-bottom: 4px solid rgba(23,34,58,.72);
      background:
        linear-gradient(90deg, rgba(255,255,255,.55) 0 20px, transparent 20px 54px) 0 50% / 74px 8px repeat-x,
        rgba(66, 115, 94, .38);
    }

    .boss-track span::before {
      content: "对手 HP";
      font-size: 0;
    }

    .boss-track span {
      font-size: 0;
    }

    .boss-track span::before {
      font-size: .94rem;
    }

    .boss-fill {
      background: linear-gradient(90deg, #21bb70, #ffdd4c, #ef454f);
    }

    .choice-card.selected,
    .option-button:hover,
    .choice-button:hover,
    .radical-tile:hover,
    .word-tile:hover {
      border-color: #2d6cdf;
    }

    @media (max-width: 720px) {
      .runner,
      .runner .avatar.photo {
        width: 82px;
        height: 104px;
      }

      .boss,
      .boss .avatar.photo {
        width: 86px;
        height: 104px;
      }

      .race-scene .runner {
        bottom: 84px;
      }

      .race-scene .boss {
        bottom: 90px;
        right: 7%;
      }

      .race-scene .coin-row {
        left: 38%;
      }
    }

<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-badge" aria-hidden="true">PK</div>
        <h1>Pokemon 华文对战</h1>
      </div>
      <div class="mini-status" aria-live="polite">
        <span class="chip">拼音 · 部首</span>
        <span class="chip" id="miniSync">本机准备好</span>
        <button class="chip music-toggle" id="musicToggle" type="button" aria-label="Music on" title="Music on">♪</button>
      </div>
    </header>

    <section class="screen active" id="screenName">
      <div class="start-layout">
        <div class="scene" aria-label="Pokemon style Chinese battle scene">
          <div class="coin-row" aria-hidden="true"><span class="coin"></span><span class="coin"></span><span class="coin"></span></div>
          <div class="question-block" aria-hidden="true">?</div>
          <div class="pipe" aria-hidden="true"></div>
          <div class="runner" id="startRunner"></div>
        </div>
        <div class="panel">
          <div class="panel-body start-copy">
            <h2 class="section-title">输入名字</h2>
            <p>准备好后，选择 Pokémon、周次和模式。</p>
            <form class="form-row" id="nameForm">
              <input class="name-input" id="studentName" autocomplete="name" maxlength="28" placeholder="Your name" required>
              <button class="btn primary" type="submit">Start</button>
            </form>
            <div class="teacher-panel" id="teacherPanel">
              <h3 class="section-title">Teacher</h3>
              <div class="teacher-grid">
                <input id="scriptUrlInput" placeholder="Apps Script Web App URL">
                <button class="btn blue" id="saveScriptUrl" type="button">Save</button>
                <button class="btn green" id="retrySync" type="button">Retry</button>
              </div>
              <div class="sync-status" id="teacherStatus"></div>
              <table class="teacher-results" aria-label="Local results">
                <thead>
                  <tr>
                    <th>Name</th>
                    <th>Week</th>
                    <th>Mode</th>
                    <th>Score</th>
                  </tr>
                </thead>
                <tbody id="teacherResultsBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="screen" id="screenCharacter">
      <div class="panel">
        <div class="panel-body">
          <h2 class="section-title">选择 Pokémon</h2>
          <div class="choice-grid" id="characterGrid"></div>
          <div class="screen-actions">
            <button class="btn ghost" type="button" data-back="screenName">Back</button>
          </div>
        </div>
      </div>
    </section>

    <section class="screen" id="screenWeek">
      <div class="panel">
        <div class="panel-body">
          <h2 class="section-title">选择周次</h2>
          <div class="option-grid" id="weekGrid"></div>
          <div class="screen-actions">
            <button class="btn ghost" type="button" data-back="screenCharacter">Back</button>
          </div>
        </div>
      </div>
    </section>

    <section class="screen" id="screenMode">
      <div class="panel">
        <div class="panel-body">
          <h2 class="section-title">选择模式</h2>
          <div class="option-grid">
            <button class="option-button" type="button" data-mode="pinyin">
              <strong>拼音模式</strong>
              <span>拼音招式挑战</span>
            </button>
            <button class="option-button" type="button" data-mode="radical">
              <strong>部首模式</strong>
              <span>部首配字对战</span>
            </button>
            <button class="option-button" type="button" data-mode="mix">
              <strong>混合挑战</strong>
              <span>联盟总决战</span>
            </button>
          </div>
          <div class="screen-actions">
            <button class="btn ghost" type="button" data-back="screenWeek">Back</button>
          </div>
        </div>
      </div>
    </section>

    <section class="screen" id="screenGame">
      <div class="game-shell">
        <div class="scene play-scene race-scene" id="playScene" aria-label="Game scene">
          <div class="speed-line one" aria-hidden="true"></div>
          <div class="speed-line two" aria-hidden="true"></div>
          <div class="speed-line three" aria-hidden="true"></div>
          <div class="race-lane" aria-hidden="true"></div>
          <div class="finish-flag" aria-hidden="true"></div>
          <div class="coin-row" aria-hidden="true"><span class="coin" id="coinA"></span><span class="coin" id="coinB"></span><span class="coin" id="coinC"></span></div>
          <div class="question-block" id="questionBlock" aria-hidden="true">?</div>
          <div class="castle" aria-hidden="true"></div>
          <div class="boss" id="boss" aria-hidden="true"><div class="boss-face"><span class="boss-eye"></span><span class="boss-eye"></span></div></div>
          <div class="runner" id="playRunner"></div>
        </div>
        <div>
          <div class="hud">
            <span class="chip" id="hudName">Name</span>
            <span class="chip" id="hudWeek">Week</span>
            <span class="chip" id="hudMode">Mode</span>
            <span class="chip" id="hudLives">♥♥♥♥♥</span>
            <button class="chip pause-chip" id="pauseButton" type="button">Pause</button>
          </div>
          <div class="question-panel">
            <div class="progress-track" aria-hidden="true"><div class="progress-bar" id="progressBar"></div></div>
            <div class="boss-track">
              <span>对手 HP</span>
              <div class="boss-bar"><div class="boss-fill" id="bossFill"></div></div>
            </div>
            <div id="questionArea"></div>
            <div class="feedback" id="feedback" aria-live="polite"></div>
          </div>
        </div>
      </div>
    </section>

    <section class="screen" id="screenFinish">
      <div class="panel">
        <div class="panel-body finish-card">
          <h2 class="section-title" id="finishTitle">完成！</h2>
          <div class="score-big" id="scoreBig">0</div>
          <p class="prompt-sub" id="finishMessage"></p>
          <div class="result-list" id="resultList"></div>
          <div class="sync-status" id="syncStatus"></div>
          <div class="screen-actions" style="justify-content:center">
            <button class="btn primary" id="playAgain" type="button">Play Again</button>
            <button class="btn green" id="newPlayer" type="button">New Player</button>
          </div>
        </div>
      </div>
    </section>

    <div class="pause-overlay" id="pauseOverlay" aria-modal="true" role="dialog" aria-labelledby="pauseTitle">
      <div class="pause-card">
        <h2 id="pauseTitle">暂停</h2>
        <div class="pause-actions">
          <button class="btn primary" id="resumeButton" type="button">继续</button>
          <button class="btn blue" id="restartButton" type="button">重新开始</button>
          <button class="btn ghost" id="pauseHomeButton" type="button">回到选择模式</button>
        </div>
      </div>
    </div>
  </main>

    function buildWordParts(item) {
      const source = item.parts?.length

        }];
      return source.map((part, index) => ({
        id: `${item.no}-${index}-${part.target}`,
        target: part.target,
        component: part.component || "",
        pinyin: part.pinyin || item.pinyin.split(" ")[index] || item.pinyin,
        radical: part.radical,
        wrongRadicals: part.wrongRadicals || [],
        standalone: Boolean(part.standalone)
      }));
    }

    function buildOptions(item, questionType) {
      const correct = questionType === "pinyin" ? item.pinyin : (item.pair?.radical || item.radical);
      const manualWrongs = questionType === "pinyin" ? item.wrongPinyin : (item.pair?.wrongRadicals || item.wrongRadicals);
      const pool = weeks[state.weekId].words
        .map((candidate) => questionType === "pinyin" ? candidate.pinyin : (candidate.pair?.radical || candidate.radical))
        .filter((value) => value !== correct);
      const unique = [...new Set([...(manualWrongs || []), ...shuffle(pool)])].slice(0, 2);
      return shuffle([correct, ...unique]).slice(0, 3);
    }

    function buildRadicalOptions(item, parts = buildWordParts(item)) {
      const corrects = [...new Set(parts.map((part) => part.radical))];
      const manualWrongs = parts.flatMap((part) => part.wrongRadicals || []);
      const pool = weeks[state.weekId].words
        .flatMap((candidate) => buildWordParts(candidate).map((part) => part.radical))
        .filter((value) => !corrects.includes(value));
      const wrongs = [...new Set([...manualWrongs, ...shuffle(pool), ...(item.wrongRadicals || [])])]
        .filter((value) => value && !corrects.includes(value));
      const desiredCount = corrects.length === 1 ? 3 : Math.min(6, corrects.length + 3);
      return shuffle([...corrects, ...wrongs.slice(0, desiredCount - corrects.length)]);
    }

    function bindTileToDrops({ tiles, drops, dropSelector, dataKey, selectMessage, missMessage, onDrop }) {
      let pickedTile = null;
      const clearPick = () => {
        if (pickedTile) pickedTile.classList.remove("selected");
        pickedTile = null;
        drops.forEach((drop) => drop.classList.remove("is-ready"));
      };

      drops.forEach((drop) => {
        drop.addEventListener("click", () => {
          if (!pickedTile || state.locked || state.paused || pickedTile.disabled || drop.classList.contains("filled")) return;
          onDrop(pickedTile, drop);
          clearPick();
        });

        drop.addEventListener("dragover", (event) => {
          event.preventDefault();
          if (!state.locked && !state.paused && !drop.classList.contains("filled")) drop.classList.add("is-ready");
        });

        drop.addEventListener("dragleave", () => drop.classList.remove("is-ready"));

        drop.addEventListener("drop", (event) => {
          event.preventDefault();
          drop.classList.remove("is-ready");
          if (state.locked || state.paused || drop.classList.contains("filled")) return;
          const value = event.dataTransfer?.getData("text/plain") || "";
          const tile = tiles.find((candidate) => candidate.dataset[dataKey] === value);
          if (tile) onDrop(tile, drop);
          clearPick();
        });
      });

      tiles.forEach((tile) => {
        let drag = null;
        let suppressClick = false;

        tile.addEventListener("dragstart", (event) => {
          if (state.locked || state.paused || tile.disabled) {
            event.preventDefault();
            return;
          }
          event.dataTransfer?.setData("text/plain", tile.dataset[dataKey]);
          event.dataTransfer.effectAllowed = "move";
          tile.classList.add("dragging");
          drops.forEach((drop) => {
            if (!drop.classList.contains("filled")) drop.classList.add("is-ready");
          });
        });

        tile.addEventListener("dragend", () => {
          tile.classList.remove("dragging");
          drops.forEach((drop) => drop.classList.remove("is-ready"));
        });

        tile.addEventListener("click", () => {
          if (suppressClick) {
            suppressClick = false;
            return;
          }
          if (!state.locked && !state.paused && !tile.disabled) {
            tiles.forEach((candidate) => candidate.classList.remove("selected"));
            pickedTile = tile;
            tile.classList.add("selected");
            drops.forEach((drop) => {
              if (!drop.classList.contains("filled")) drop.classList.add("is-ready");
            });
            setFeedback(selectMessage(tile));
          }
        });

        tile.addEventListener("pointerdown", (event) => {
          if (state.locked || state.paused || tile.disabled) return;
          drag = {
            pointerId: event.pointerId,
            startX: event.clientX,
            startY: event.clientY,
            moved: false
          };
          tile.setPointerCapture?.(event.pointerId);
          tile.classList.add("dragging");
          drops.forEach((drop) => {
            if (!drop.classList.contains("filled")) drop.classList.add("is-ready");
          });
        });

        tile.addEventListener("pointermove", (event) => {
          if (!drag || drag.pointerId !== event.pointerId) return;
          const dx = event.clientX - drag.startX;
          const dy = event.clientY - drag.startY;
          if (Math.abs(dx) + Math.abs(dy) > 4) drag.moved = true;
          tile.style.transform = `translate(${dx}px, ${dy}px) scale(1.04)`;
        });

        tile.addEventListener("pointerup", (event) => {
          if (!drag || drag.pointerId !== event.pointerId) return;
          tile.releasePointerCapture?.(event.pointerId);
          tile.classList.remove("dragging");
          drops.forEach((drop) => drop.classList.remove("is-ready"));
          tile.style.transform = "";
          tile.style.pointerEvents = "none";
          const drop = document.elementFromPoint(event.clientX, event.clientY)?.closest(dropSelector);
          tile.style.pointerEvents = "";
          if (drop && !drop.classList.contains("filled")) {
            suppressClick = true;
            onDrop(tile, drop);
            clearPick();
          } else if (drag.moved && !state.locked && !state.paused) {
            setFeedback(missMessage);
          }
          drag = null;
        });

        tile.addEventListener("pointercancel", (event) => {
          if (!drag || drag.pointerId !== event.pointerId) return;
          tile.classList.remove("dragging");
          drops.forEach((drop) => drop.classList.remove("is-ready"));
          tile.style.transform = "";
          drag = null;
        });
      });
    }

    function flashTile(tile, className) {
      tile.classList.remove(className);
      void tile.offsetWidth;
      tile.classList.add(className);
      window.setTimeout(() => tile.classList.remove(className), 430);
    }

    function bindRadicalWordBuild(item, parts) {
      const radicalTiles = [...dom.questionArea.querySelectorAll(".radical-tile")];
      const radicalDrops = [...dom.questionArea.querySelectorAll(".radical-drop")];
      const wordTiles = [...dom.questionArea.querySelectorAll(".word-tile")];
      const wordSlots = [...dom.questionArea.querySelectorAll(".word-slot")];
      const builtPartIds = new Set();
      const placedTileIds = new Set();

      const loseLife = (answer, expected, type, target) => {
        state.wrong += 1;
        state.lives -= 1;
        state.answers.push({
          hanzi: target,
          word: item.word,
          type,
          answer,
          correct: false,
          attempts: state.attemptsForQuestion
        });
        playWrongFx();
        updateHud();
        if (state.lives <= 0) {
          state.locked = true;
          setFeedback(`答案是 ${expected}。`, "bad");
          setTimeout(finishGame, 760);
        } else {
          setFeedback("再试一次！", "bad");
        }
      };

      const placeRadical = (tile, drop) => {
        if (state.locked || state.paused || drop.classList.contains("filled")) return;
        const part = parts.find((candidate) => candidate.id === drop.dataset.partId);
        if (!part) return;
        const answer = tile.dataset.answer;
        state.attemptsForQuestion += 1;
        if (answer !== part.radical) {
          flashTile(tile, "wrong");
          loseLife(answer, part.radical, "radical-part", part.target);
          return;
        }

        drop.classList.add("filled");
        drop.innerHTML = `<span class="slot-value">${safeText(answer)}</span>`;
        const builder = [...dom.questionArea.querySelectorAll("[data-builder-id]")]
          .find((candidate) => candidate.dataset.builderId === part.id);
        const preview = [...dom.questionArea.querySelectorAll("[data-preview-id]")]
          .find((candidate) => candidate.dataset.previewId === part.id);
        builder?.classList.add("complete");
        if (preview) {
          preview.classList.add("complete");
          preview.textContent = part.target;
        }
        builtPartIds.add(part.id);
        if (builtPartIds.size === parts.length) {
          wordTiles.forEach((wordTile) => {
            wordTile.disabled = false;
            wordTile.classList.remove("locked");
          });
        }
        state.answers.push({
          hanzi: part.target,
          word: item.word,
          type: "radical-part",
          answer,
          correct: true,
          attempts: state.attemptsForQuestion
        });
        flashTile(tile, "correct");
        playNote(783.99, 0.1);
        setFeedback(builtPartIds.size === parts.length ? "构词开始！" : `拼好「${part.target}」！`, "good");
      };

      const placeWordTile = (tile, slot) => {
        if (state.locked || state.paused || tile.disabled || slot.classList.contains("filled")) return;
        const answer = tile.dataset.char;
        const expected = slot.dataset.target;
        state.attemptsForQuestion += 1;
        if (answer !== expected) {
          flashTile(tile, "wrong");
          loseLife(answer, expected, "word-build", item.word);
          return;
        }

        slot.classList.add("filled");
        slot.innerHTML = `<span class="slot-value">${safeText(answer)}</span>`;
        tile.classList.add("correct");
        tile.disabled = true;
        placedTileIds.add(tile.dataset.partId);
        state.answers.push({
          hanzi: answer,
          word: item.word,
          type: "word-build",
          answer,
          correct: true,
          attempts: state.attemptsForQuestion
        });

        if (placedTileIds.size >= parts.length) {
          completeRadicalWord(item, parts);
        } else {
          setFeedback("继续组成词语！", "good");
          playNote(880, 0.1);
        }
      };

      bindTileToDrops({
        tiles: radicalTiles,
        drops: radicalDrops,
        dropSelector: ".radical-drop",
        dataKey: "answer",
        selectMessage: (tile) => `已拿起「${tile.dataset.answer}」。`,
        missMessage: "差一点！",
        onDrop: placeRadical
      });

      bindTileToDrops({
        tiles: wordTiles,
        drops: wordSlots,
        dropSelector: ".word-slot",
        dataKey: "partId",
        selectMessage: (tile) => `已拿起「${tile.dataset.char}」。`,
        missMessage: "差一点！",
        onDrop: placeWordTile
      });
    }

    function completeRadicalWord(item, parts) {
      state.locked = true;
      const perfectAttempts = parts.length * 2;
      const earned = state.attemptsForQuestion === perfectAttempts ? 10 : 6;
      state.score += earned;
      state.correct += 1;
      state.answers.push({
        hanzi: parts.map((part) => part.target).join(""),
        word: item.word,
        type: "radical-word",
        answer: item.word,
        correct: true,
        attempts: state.attemptsForQuestion
      });
      playCorrectFx();
      setFeedback(`组成「${item.word}」！+${earned} 能量`, "good");
      setTimeout(nextQuestion, 820);
    }

    function chooseAnswer(button, correctAnswer, item, questionType) {
      if (state.locked || state.paused || button.disabled) return;
      state.attemptsForQuestion += 1;
      const answer = button.dataset.answer;
      if (answer === correctAnswer) {
        button.classList.add("correct");
        state.locked = true;
        if (questionType === "radical") {
          const drop = document.getElementById("radicalDrop");
          const preview = document.getElementById("targetPreview");
          if (drop) {
            drop.classList.add("filled");
            drop.innerHTML = `<span class="slot-value">${safeText(answer)}</span>`;
          }
          if (preview) {
            preview.classList.add("complete");
            preview.textContent = item.pair?.target || item.hanzi;
          }
        }
        const earned = state.attemptsForQuestion === 1 ? 10 : 6;
        state.score += earned;
        state.correct += 1;
        state.answers.push({
          hanzi: item.hanzi,
          word: item.word,
          type: questionType,
          answer,
          correct: true,
          attempts: state.attemptsForQuestion
        });
        playCorrectFx();
        setFeedback(`答对了！+${earned} 能量`, "good");
        setTimeout(nextQuestion, 720);
        return;
      }

      button.classList.add("wrong");
      button.disabled = true;
      state.wrong += 1;
      state.lives -= 1;
      state.answers.push({
        hanzi: item.hanzi,
        word: item.word,
        type: questionType,
        answer,
        correct: false,
        attempts: state.attemptsForQuestion
      });
      playWrongFx();
      updateHud();
      if (state.lives <= 0) {
        state.locked = true;
        setFeedback(`答案是 ${correctAnswer}。`, "bad");
        setTimeout(finishGame, 760);
        return;
      }
      setFeedback("再试一次！", "bad");
    }

    function nextQuestion() {
      state.currentIndex += 1;
      if (state.currentIndex >= state.order.length) {
        finishGame();
      } else {
        renderQuestion();
      }
    }

    function playCorrectFx() {
      dom.playRunner.classList.remove("jump");
      dom.questionBlock.classList.remove("bump");
      dom.boss.classList.remove("hit");
      const coin = [dom.coinA, dom.coinB, dom.coinC][state.correct % 3];
      coin.classList.remove("pop");
      void dom.playRunner.offsetWidth;
      dom.playRunner.classList.add("jump");
      dom.questionBlock.classList.add("bump");
      dom.boss.classList.add("hit");
      coin.classList.add("pop");
      playNote(987.77, 0.12);
      window.setTimeout(() => {
        dom.playRunner.classList.remove("jump");
        dom.questionBlock.classList.remove("bump");
        dom.boss.classList.remove("hit");
        coin.classList.remove("pop");
      }, 500);
      updateHud();
    }

    function playWrongFx() {
      dom.playScene.classList.remove("shake");
      void dom.playScene.offsetWidth;
      dom.playScene.classList.add("shake");
      playNote(164.81, 0.16);
      window.setTimeout(() => dom.playScene.classList.remove("shake"), 260);
    }

    function finishGame() {
      closePause();
      stopChineseAudio();
      const totalQuestions = state.order.length;
      const maxScore = totalQuestions * 10;
      const percent = maxScore ? Math.round((state.score / maxScore) * 100) : 0;
      dom.finishTitle.textContent = state.lives > 0 ? "对战胜利！" : "再对战一次！";
      dom.finishMessage.textContent = `${state.playerName} 完成了 ${weeks[state.weekId].short} 的 ${modeLabel(state.mode)}。`;
      dom.scoreBig.textContent = state.score;
      dom.resultList.innerHTML = [
        ["学生", state.playerName],
        ["角色", state.character.name],
        ["周次", weeks[state.weekId].label],
        ["模式", modeLabel(state.mode)],
        ["答对", `${state.correct} / ${totalQuestions}`],
        ["生命", `${state.lives} / 5`],
        ["百分比", `${percent}%`],
        ["题库", "拼音 + 部首"]
      ].map(([label, value]) => `<div class="result-item"><strong>${safeText(label)}</strong><br>${safeText(value)}</div>`).join("");

      const result = {
        id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
        gameId: GAME_ID,
        gameTitle: GAME_TITLE,
        sheetName: SHEET_NAME,
        spreadsheetId: SPREADSHEET_ID,
        studentName: state.playerName,
        character: state.character.name,
        week: weeks[state.weekId].label,
        mode: modeLabel(state.mode),
        score: state.score,
        maxScore,
        percent,
        correct: state.correct,
        wrong: state.wrong,
        livesLeft: state.lives,
        totalQuestions,
        answers: state.answers,
        clientTime: new Date().toISOString(),
        userAgent: navigator.userAgent
      };

      saveResult(result);
      showScreen("screenFinish");
      submitResult(result);
      renderTeacherResults();
    }

    function loadJson(key, fallback) {
      try {
        return JSON.parse(localStorage.getItem(key) || JSON.stringify(fallback));
      } catch (error) {
        return fallback;
      }
    }

    function saveJson(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function saveResult(result) {
      const results = loadJson(RESULT_KEY, []);
      results.unshift(result);
      saveJson(RESULT_KEY, results.slice(0, 60));
      const pending = loadJson(PENDING_KEY, []);
      pending.push(result);
      saveJson(PENDING_KEY, pending);
      updateSyncMini();
    }

    function getAppsScriptUrl() {
      const savedUrl = localStorage.getItem(SCRIPT_URL_KEY);
      if (savedUrl && !LEGACY_APPS_SCRIPT_URLS.has(savedUrl)) {
        return savedUrl;
      }
      if (savedUrl) {
        localStorage.removeItem(SCRIPT_URL_KEY);
      }
      return DEFAULT_APPS_SCRIPT_URL;
    }



    async function endpointSupportsSheet(url) {
      try {
        const joiner = url.includes("?") ? "&" : "?";
        const response = await fetch(`${url}${joiner}health=${Date.now()}`, {
          method: "GET",
          cache: "no-store"
        });
        const info = await response.json();
        return Boolean(info && info.ok === true && Array.isArray(info.sheets) && info.sheets.includes(SHEET_NAME));
      } catch (error) {
        return false;
      }
    }

    async function submitResult(result) {
      const url = getAppsScriptUrl();
      if (!url) {
        dom.syncStatus.textContent = "成绩已保存在本机。老师设置排行榜连接后会自动补交。";
        updateSyncMini();
        return;
      }

      dom.syncStatus.textContent = "正在检查排行榜...";
      const sheetReady = await endpointSupportsSheet(url);
      if (!sheetReady) {
        dom.syncStatus.textContent = "成绩已保存在本机。老师更新 Apps Script 后会自动补交。";
        updateSyncMini();
        return;
      }

      dom.syncStatus.textContent = "正在上传成绩...";
      try {
        const response = await fetch(url, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(result)
        });
        void response;
        markSubmitted(result.id);
        dom.syncStatus.textContent = "成绩已上传到排行榜。";
      } catch (error) {
        dom.syncStatus.textContent = "暂时不能上传，成绩会保存在本机稍后重试。";
      } finally {
        updateSyncMini();
      }
    }

    function markSubmitted(id) {
      const pending = loadJson(PENDING_KEY, []).filter((item) => item.id !== id);
      saveJson(PENDING_KEY, pending);
      updateSyncMini();
    }

    async function retryPending() {
      const url = getAppsScriptUrl();
      const pending = loadJson(PENDING_KEY, []);
      if (!url) {
        dom.teacherStatus.textContent = "请先保存 Apps Script Web App URL。";
        updateSyncMini();
        return;
      }
      if (!pending.length) {
        dom.teacherStatus.textContent = "没有等待上传的成绩。";
        updateSyncMini();
        return;
      }
      dom.teacherStatus.textContent = `正在补交 ${pending.length} 份成绩...`;
      for (const item of pending) {
        await submitResult(item);
      }
      dom.teacherStatus.textContent = `补交完成，剩下 ${loadJson(PENDING_KEY, []).length} 份。`;
      renderTeacherResults();
      updateSyncMini();
    }

    function updateSyncMini() {
      const pending = loadJson(PENDING_KEY, []);
      dom.miniSync.textContent = pending.length ? `待上传 ${pending.length}` : "本机准备好";
    }

    function renderTeacherResults() {
      if (!TEACHER_MODE) return;
      const results = loadJson(RESULT_KEY, []);
      dom.teacherResultsBody.innerHTML = results.slice(0, 12).map((result) => `
        <tr>

          <td>${safeText(result.score)} / ${safeText(result.maxScore)}</td>

      `).join("");
    }

    function ensureMusicContext() {
      if (musicState.context) return musicState.context;
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) return null;
      const context = new AudioContextClass();
      const master = context.createGain();
      master.gain.value = 0;
      master.connect(context.destination);
      musicState.context = context;
      musicState.master = master;
      return context;
    }

    function setMusicGain(value) {
      if (!musicState.context || !musicState.master) return;
      musicState.master.gain.setTargetAtTime(value, musicState.context.currentTime, 0.04);
    }

    function playNote(frequency, duration = 0.12) {
      const context = ensureMusicContext();
      if (!context || !musicState.enabled) return;
      context.resume?.();
      const oscillator = context.createOscillator();
      const gain = context.createGain();
      const now = context.currentTime;
      oscillator.type = "square";
      oscillator.frequency.setValueAtTime(frequency, now);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.12, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
      oscillator.connect(gain);
      gain.connect(context.destination);
      oscillator.start(now);
      oscillator.stop(now + duration + 0.02);
    }

    function playMusicStep() {
      if (!musicState.enabled || !musicState.context) return;
      const note = musicState.pattern[musicState.step % musicState.pattern.length];
      const oscillator = musicState.context.createOscillator();
      const gain = musicState.context.createGain();
      const now = musicState.context.currentTime;
      oscillator.type = "square";
      oscillator.frequency.setValueAtTime(note, now);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.32, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.12);
      oscillator.connect(gain);
      gain.connect(musicState.master);
      oscillator.start(now);
      oscillator.stop(now + 0.14);
      musicState.step += 1;
    }

    function startMusic() {
      if (!musicState.enabled) return;
      const context = ensureMusicContext();
      if (!context) return;
      context.resume?.();
      setMusicGain(musicState.baseGain);
      if (!musicState.timer) {
        playMusicStep();
        musicState.timer = window.setInterval(playMusicStep, 170);
      }
      musicState.started = true;
      updateMusicButton();
    }

    function stopMusic() {
      if (musicState.timer) {
        window.clearInterval(musicState.timer);
        musicState.timer = null;
      }
      setMusicGain(0);
      musicState.started = false;
      updateMusicButton();
    }

    function toggleMusic() {
      musicState.enabled = !musicState.enabled;
      localStorage.setItem(MUSIC_KEY, musicState.enabled ? "on" : "off");
      if (musicState.enabled) {
        startMusic();
      } else {
        stopMusic();
      }
      updateMusicButton();
    }

    function updateMusicButton() {
      dom.musicToggle.classList.toggle("is-off", !musicState.enabled);
      dom.musicToggle.setAttribute("aria-label", musicState.enabled ? "Music on" : "Music off");
      dom.musicToggle.title = musicState.enabled ? "Music on" : "Music off";
    }

    function stopChineseAudio() {
      if (activeChineseAudio) {
        activeChineseAudio.pause();
        activeChineseAudio.removeAttribute("src");
        activeChineseAudio = null;
      }
      if ("speechSynthesis" in window) {
        window.speechSynthesis.cancel();
      }
    }

    function speakChinese(text) {
      if (!("speechSynthesis" in window) || state.paused) return;
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "zh-CN";
      utterance.rate = 0.58;
      utterance.pitch = 1;
      const voices = window.speechSynthesis.getVoices?.() || [];
      const zhVoice = voices.find((voice) => /^zh(-|_)?(CN|SG|MY)?/i.test(voice.lang));
      if (zhVoice) utterance.voice = zhVoice;
      window.speechSynthesis.speak(utterance);
    }

    function playChineseAudio(text) {
      if (state.paused) return;
      stopChineseAudio();
      setFeedback(`正在播放：${text}`);
      const audio = new Audio(`${CHINESE_AUDIO_URL}${encodeURIComponent(text)}`);
      audio.playbackRate = 0.68;
      activeChineseAudio = audio;
      let usedFallback = false;
      const fallback = () => {
        if (usedFallback || state.paused) return;
        usedFallback = true;
        speakChinese(text);
      };
      audio.addEventListener("error", fallback, { once: true });
      audio.addEventListener("ended", () => {
        if (activeChineseAudio === audio) activeChineseAudio = null;
      }, { once: true });
      const playRequest = audio.play();
      if (playRequest && typeof playRequest.catch === "function") {
        playRequest.catch(fallback);
      }
    }

    function openPause() {
      if (!document.getElementById("screenGame").classList.contains("active")) return;
      state.paused = true;
      stopChineseAudio();
      stopMusic();
      dom.pauseOverlay.classList.add("visible");
    }

    function closePause() {
      if (!dom.pauseOverlay) return;
      dom.pauseOverlay.classList.remove("visible");
      state.paused = false;
    }

    function resumeGame() {
      closePause();
      startMusic();
    }

    }

    renderStatic();
    bindEvents();
  </script>
